<link rel="stylesheet" href="/styles.css">
<style>
.article{max-width:720px;margin:calc(var(--nav-height)+var(--cat-height)+48px) auto 60px;padding:0 24px}
.breadcrumb{font-size:13px;color:var(--text-muted);margin-bottom:24px}.breadcrumb a{color:var(--accent)}
.article-category{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.article h1{font-family:'Outfit',sans-serif;font-size:36px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;margin-bottom:16px}
.article-meta{display:flex;gap:16px;font-size:13px;color:var(--text-muted);margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.article-body{font-size:16px;line-height:1.85;color:var(--text-secondary)}
.article-body h2{font-family:'Outfit',sans-serif;font-size:22px;font-weight:600;color:var(--text-primary);margin:32px 0 12px}
.article-body h3{font-family:'Outfit',sans-serif;font-size:18px;font-weight:600;color:var(--text-primary);margin:24px 0 8px}
.article-body p{margin-bottom:16px}
.article-body ul,.article-body ol{margin-bottom:16px;padding-left:24px}
.article-body li{margin-bottom:8px}
.article-body a{color:var(--accent)}
.article-body blockquote{border-left:3px solid var(--accent);padding:12px 20px;margin:16px 0;background:var(--bg-secondary);border-radius:0 8px 8px 0;font-style:italic}
.article-footer{margin-top:40px;padding-top:24px;border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap}
.loading{text-align:center;padding:100px 24px;color:var(--text-muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.article h1{font-size:26px}.article-body{font-size:15px}}
</style>

<div class="article" id="articleContent"><div class="loading"><div class="spinner"></div><p>Loading article...</p></div></div>
<footer class="footer-simple">WIB — Independent. Data-driven.</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="/config.js"></script>
<script>
const db=initFirebase();
async function load(){
  const id=new URLSearchParams(window.location.search).get('id');
  if(!id){document.getElementById('articleContent').innerHTML='<div class="loading">Article not found. <a href="/blog" style="color:var(--accent)">Back to Blog</a></div>';return}
  try{
    const doc=await db.collection('blog_posts').doc(id).get();
    if(!doc.exists){document.getElementById('articleContent').innerHTML='<div class="loading">Article not found. <a href="/blog" style="color:var(--accent)">Back to Blog</a></div>';return}
    const p=doc.data();
    document.title=p.title+' — WIB Blog';
    const date=p.createdAt?.toDate?p.createdAt.toDate().toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'}):'';
    document.getElementById('articleContent').innerHTML=`
      <div class="breadcrumb"><a href="/blog">Blog</a> / ${p.title}</div>
      <div class="article-category">${p.category||'General'}</div>
      <h1>${p.title||'Untitled'}</h1>
      <div class="article-meta">
        <span>${p.readTime||'5'} min read</span>
        ${date?`<span>${date}</span>`:''}
        ${p.author?`<span>By ${p.author}</span>`:''}
      </div>
      <div class="article-body">${p.content||p.body||'<p>Content not available.</p>'}</div>
      <div class="article-footer">
        <a href="/blog" class="btn-secondary" style="font-size:13px;padding:10px 20px">Back to Blog</a>
        <a href="/schools" class="btn-secondary" style="font-size:13px;padding:10px 20px">Browse Schools</a>
        <a href="/colleges" class="btn-secondary" style="font-size:13px;padding:10px 20px">Browse Colleges</a>
      </div>
    `;
  }catch(err){
    console.error(err);
    document.getElementById('articleContent').innerHTML='<div class="loading">Error loading article. <a href="/blog" style="color:var(--accent)">Back to Blog</a></div>';
  }
}
load();
</script>
