<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — WIB | Guides, Comparisons & Insights</title>
    <meta name="description" content="Expert guides on choosing schools, colleges, electronics, and more. Data-driven insights from India's comparison platform.">
    <link rel="canonical" href="https://wibest.in/blog">
    <meta property="og:title" content="Blog — WIB">
    <meta property="og:description" content="Expert guides on choosing schools, colleges, electronics, and more.">
    <meta property="og:url" content="https://wibest.in/blog">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="WIB">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#0F172A;--navy-light:#1E293B;--slate-700:#334155;--slate-600:#475569;--slate-500:#64748B;--slate-400:#94A3B8;--slate-300:#CBD5E1;--slate-200:#E2E8F0;--slate-100:#F1F5F9;--slate-50:#F8FAFC;--blue:#3B82F6;--blue-dark:#2563EB;--blue-50:#EFF6FF;--green:#16A34A;--green-50:#F0FDF4;--amber:#D97706;--white:#FFF;--radius-lg:14px;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',-apple-system,sans-serif;color:var(--navy);background:var(--slate-50);line-height:1.6;-webkit-font-smoothing:antialiased;}

        .nav-top{display:flex;align-items:center;justify-content:space-between;padding:12px 48px;background:var(--white);border-bottom:1px solid var(--slate-200);position:sticky;top:0;z-index:100;}
        .logo{text-decoration:none;display:flex;align-items:center;}.logo-img{height:68px;width:auto;}
        .nav-links{display:flex;gap:28px;align-items:center;}.nav-links a{text-decoration:none;color:var(--slate-600);font-weight:500;font-size:14px;}.nav-links a:hover,.nav-links a.active{color:var(--navy);}
        .btn-nav{background:var(--navy);color:var(--white);padding:9px 20px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;}
        .nav-categories{display:flex;gap:0;padding:0 48px;background:var(--slate-50);border-bottom:1px solid var(--slate-200);overflow-x:auto;scrollbar-width:none;}.nav-categories::-webkit-scrollbar{display:none;}.nav-cat{text-decoration:none;color:var(--slate-500);font-weight:500;font-size:13px;padding:10px 16px;white-space:nowrap;border-bottom:2px solid transparent;}.nav-cat:hover{color:var(--navy);}.nav-cat.active{color:var(--blue);border-bottom-color:var(--blue);}.nav-cat-soon{font-size:10px;font-weight:700;color:var(--slate-400);background:var(--slate-200);padding:1px 6px;border-radius:4px;margin-left:6px;}

        .page-header{background:var(--white);padding:40px 48px 32px;border-bottom:1px solid var(--slate-200);}
        .page-header-inner{max-width:900px;margin:0 auto;}
        .page-header h1{font-size:32px;font-weight:800;color:var(--navy);margin-bottom:8px;letter-spacing:-0.02em;}
        .page-header p{color:var(--slate-500);font-size:16px;}

        .blog-container{max-width:900px;margin:0 auto;padding:32px 48px 64px;}

        .filter-tabs{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
        .filter-tab{padding:7px 16px;border:1.5px solid var(--slate-200);border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;color:var(--slate-500);background:var(--white);cursor:pointer;transition:all 0.15s;}
        .filter-tab:hover{border-color:var(--slate-300);color:var(--navy);}
        .filter-tab.active{background:var(--navy);color:var(--white);border-color:var(--navy);}

        .blog-grid{display:flex;flex-direction:column;gap:20px;}

        .blog-card{background:var(--white);border:1px solid var(--slate-200);border-radius:var(--radius-lg);overflow:hidden;transition:all 0.2s;text-decoration:none;color:inherit;display:grid;grid-template-columns:280px 1fr;}
        .blog-card:hover{border-color:var(--slate-300);box-shadow:0 8px 30px rgba(0,0,0,0.08);transform:translateY(-2px);}
        .blog-card-img{background:var(--slate-100);overflow:hidden;}
        .blog-card-img img{width:100%;height:100%;object-fit:cover;min-height:200px;}
        .blog-card-img .placeholder{display:flex;align-items:center;justify-content:center;height:100%;min-height:200px;color:var(--slate-300);}
        .blog-card-img .placeholder svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1.2;}
        .blog-card-body{padding:24px;display:flex;flex-direction:column;justify-content:center;}
        .blog-card-meta{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
        .blog-tag{padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
        .tag-schools{background:var(--blue-50);color:var(--blue-dark);}
        .tag-colleges{background:#F5F3FF;color:#7C3AED;}
        .tag-general{background:var(--slate-100);color:var(--slate-600);}
        .tag-electronics{background:var(--green-50);color:var(--green);}
        .blog-date{font-size:11px;color:var(--slate-400);font-weight:500;}
        .blog-card-title{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px;line-height:1.3;letter-spacing:-0.01em;}
        .blog-card-excerpt{font-size:14px;color:var(--slate-500);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
        .blog-card-link{font-size:13px;font-weight:600;color:var(--blue);display:flex;align-items:center;gap:4px;}
        .blog-card-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

        .featured-card{grid-template-columns:1fr;}.featured-card .blog-card-img img{max-height:300px;}.featured-card .blog-card-body{padding:28px;}.featured-card .blog-card-title{font-size:26px;}
        .featured-label{font-size:10px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}

        .empty-state{text-align:center;padding:60px 20px;color:var(--slate-400);}
        .empty-state h3{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px;}
        .loading-container{text-align:center;padding:60px;}.spinner{width:32px;height:32px;border:2.5px solid var(--slate-200);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px;}@keyframes spin{to{transform:rotate(360deg);}}

        .footer{background:var(--navy);color:var(--slate-500);text-align:center;padding:28px;font-size:13px;}

        .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;}.hamburger svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2;}.mobile-menu{display:none;position:fixed;inset:0;background:var(--white);z-index:200;padding:20px;flex-direction:column;}.mobile-menu.open{display:flex;}.mobile-menu-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}.mobile-menu-close{background:none;border:none;cursor:pointer;padding:4px;}.mobile-menu-close svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2;}.mobile-menu a{display:block;padding:14px 0;font-size:18px;font-weight:600;color:var(--navy);text-decoration:none;border-bottom:1px solid var(--slate-100);}.mobile-menu a:hover{color:var(--blue);}
        .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;}.hamburger svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2;}.mobile-menu{display:none;position:fixed;inset:0;background:var(--white);z-index:200;padding:20px;flex-direction:column;}.mobile-menu.open{display:flex;}.mobile-menu-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}.mobile-menu-close{background:none;border:none;cursor:pointer;padding:4px;}.mobile-menu-close svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2;}.mobile-menu a{display:block;padding:14px 0;font-size:18px;font-weight:600;color:var(--navy);text-decoration:none;border-bottom:1px solid var(--slate-100);}.mobile-menu a:hover{color:var(--blue);}@media(max-width:768px){.hamburger{display:block;}.logo-img{height:48px;}.btn-nav{padding:7px 14px;font-size:12px;}.nav-cat{padding:8px 10px;font-size:12px;}.nav-top{padding:10px 20px;}.nav-links{display:none;}.page-header{padding:28px 20px;}.blog-container{padding:20px;}.blog-card{grid-template-columns:1fr;}.featured-card .blog-card-img img{max-height:200px;}}
    </style>
</head>
<body>
    <nav class="nav-top"><a href="/" class="logo"><img src="/logo.png" alt="WIB" class="logo-img"></a><div class="nav-links"><a href="/">Home</a><a href="/about">About</a><a href="/blog" class="active">Blog</a><a href="/contact">Contact</a></div><button class="hamburger" onclick="document.getElementById('mobileMenu').classList.add('open')"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><a href="/compare" class="btn-nav">Compare</a></nav>
    <div class="mobile-menu" id="mobileMenu"><div class="mobile-menu-top"><a href="/" class="logo"><img src="/logo.png" alt="WIB" class="logo-img" style="height:48px;"></a><button class="mobile-menu-close" onclick="document.getElementById('mobileMenu').classList.remove('open')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><a href="/">Home</a><a href="/schools">Schools</a><a href="/colleges">Colleges</a><a href="/compare">Compare</a><a href="/blog">Blog</a><a href="/about">About</a><a href="/contact">Contact</a><a href="/connect">Connect</a></div>
    <div class="nav-categories"><a href="/schools" class="nav-cat">Schools</a><a href="/colleges" class="nav-cat">Colleges</a><a href="#" class="nav-cat">Electronics<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Cars & Bikes<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Places<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Travel<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Restaurants<span class="nav-cat-soon">SOON</span></a></div>

    <section class="page-header"><div class="page-header-inner"><h1>Blog</h1><p>Expert guides, comparisons, and insights to help you make better decisions.</p></div></section>

    <div class="blog-container">
        <div class="filter-tabs" id="filterTabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="schools">Schools</button>
            <button class="filter-tab" data-filter="colleges">Colleges</button>
            <button class="filter-tab" data-filter="general">General</button>
        </div>
        <div class="blog-grid" id="blogGrid">
            <div class="loading-container"><div class="spinner"></div><p style="color:var(--slate-400);font-size:14px;">Loading articles...</p></div>
        </div>
    </div>

    <footer class="footer">WIB &mdash; Independent. Data-driven.</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        const fc={apiKey:"AIzaSyA_IcdzywseRgXTY8MqiOY1LLfwnfps3Oo",authDomain:"wibest-449fe.firebaseapp.com",projectId:"wibest-449fe",storageBucket:"wibest-449fe.firebasestorage.app",messagingSenderId:"438027122345",appId:"1:438027122345:web:70b5427de9bf0a74f51bb8"};
        const db=getFirestore(initializeApp(fc));

        let allPosts=[];
        const tagColors={schools:'tag-schools',colleges:'tag-colleges',general:'tag-general',electronics:'tag-electronics'};

        function formatDate(ts){
            if(!ts)return'';
            const d=ts.toDate?ts.toDate():new Date(ts);
            return d.toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'});
        }

        function card(post,featured=false){
            const tag=post.category||'general';
            const tagClass=tagColors[tag]||'tag-general';
            const img=post.cover_image||'';
            return`<a href="/blog-post?id=${post.id}" class="blog-card ${featured?'featured-card':''}">
                <div class="blog-card-img">${img?`<img src="${img}" alt="${post.title}" loading="lazy">`:`<div class="placeholder"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>`}</div>
                <div class="blog-card-body">
                    ${featured?'<div class="featured-label">Featured</div>':''}
                    <div class="blog-card-meta"><span class="blog-tag ${tagClass}">${tag}</span><span class="blog-date">${formatDate(post.published_at||post.created_at)}</span>${post.read_time?`<span class="blog-date">${post.read_time} min read</span>`:''}</div>
                    <div class="blog-card-title">${post.title}</div>
                    <div class="blog-card-excerpt">${post.excerpt||''}</div>
                    <span class="blog-card-link">Read article <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></span>
                </div>
            </a>`;
        }

        function render(filter='all'){
            const grid=document.getElementById('blogGrid');
            let posts=filter==='all'?allPosts:allPosts.filter(p=>(p.category||'general')===filter);
            posts=posts.filter(p=>p.status==='published');

            if(!posts.length){
                grid.innerHTML='<div class="empty-state"><h3>No articles yet</h3><p>Check back soon for expert guides and comparisons.</p></div>';
                return;
            }

            let html='';
            posts.forEach((p,i)=>html+=card(p,i===0&&filter==='all'));
            grid.innerHTML=html;
        }

        // Filter tabs
        document.querySelectorAll('.filter-tab').forEach(tab=>{
            tab.addEventListener('click',()=>{
                document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                render(tab.dataset.filter);
            });
        });

        // Load posts
        (async()=>{
            try{
                const snap=await getDocs(collection(db,"blog_posts"));
                allPosts=[];snap.forEach(d=>allPosts.push({id:d.id,...d.data()}));
                allPosts.sort((a,b)=>{
                    const at=a.published_at?.seconds||a.created_at?.seconds||0;
                    const bt=b.published_at?.seconds||b.created_at?.seconds||0;
                    return bt-at;
                });
                render();
            }catch(e){
                document.getElementById('blogGrid').innerHTML='<div class="empty-state"><h3>No articles yet</h3><p>Check back soon for expert guides and comparisons.</p></div>';
            }
        })();
    </script>
</body>
</html>
