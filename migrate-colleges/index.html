const logEl=document.getElementById('log');
function log(text,cls=''){logEl.innerHTML+=`<div class="${cls}">${text}</div>`;logEl.scrollTop=logEl.scrollHeight}

async function startMigration(){
  const email=document.getElementById('email').value;
  const pass=document.getElementById('password').value;
  const btn=document.getElementById('startBtn');
  if(!email||!pass){alert('Enter email and password');return}

  btn.disabled=true;btn.textContent='Logging in...';
  logEl.style.display='block';
  log('Logging in...','info');

  try{
    await auth.signInWithEmailAndPassword(email,pass);
    log('Logged in successfully','ok');
  }catch(e){
    log('Login failed: '+e.message,'err');
    btn.disabled=false;btn.textContent='Login & Start Migration';
    return;
  }

  btn.textContent='Migrating...';
  log('Starting migration of '+colleges.length+' colleges...','info');
  let ok=0,fail=0;
  const bar=document.getElementById('progressBar');

  for(let i=0;i<colleges.length;i++){
    const c=colleges[i];
    const id=c.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    try{
      await db.collection('colleges').doc(id).set({
        ...c,
        category:'college',
        facilities:c.facilities||{transport:true,sports:true,library:true,lab:true,hostel:true,wifi:true,cafeteria:true},
        coordinates:{lat:c.lat,lng:c.lng},
        google_rating:c.google_rating||0,
        google_reviews_count:c.google_reviews||0,
        created_at:firebase.firestore.FieldValue.serverTimestamp()
      });
      ok++;
      log(`[${i+1}/${colleges.length}] ${c.name} — OK`,'ok');
    }catch(e){
      fail++;
      log(`[${i+1}/${colleges.length}] ${c.name} — FAILED: ${e.message}`,'err');
    }
    bar.style.width=((i+1)/colleges.length*100)+'%';
  }

  log(`\nMigration complete: ${ok} success, ${fail} failed`,'info');
  btn.textContent=`Done — ${ok} colleges migrated`;
}
