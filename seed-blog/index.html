        const articles=[
            {id:"cbse-vs-icse-which-board-is-better",title:"CBSE vs ICSE: Which Board is Better for Your Child in 2025?",slug:"cbse-vs-icse-which-board-is-better",excerpt:"A comprehensive comparison of CBSE and ICSE boards covering curriculum, difficulty, acceptance, career prospects, and which one suits different types of learners.",category:"schools",author:"WIB Team",read_time:8,cover_image:"https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=800&h=400&fit=crop",status:"published",content:`<h2>The Board Decision: Why It Matters</h2><p>Choosing between CBSE and ICSE is one of the most significant decisions parents make for their child's education. Both boards have distinct philosophies, teaching approaches, and outcomes.</p><h2>Curriculum Comparison</h2><p><strong>CBSE</strong> follows NCERT curriculum focused on science and mathematics, aligning well with JEE and NEET.</p><p><strong>ICSE</strong> offers a broader curriculum with equal emphasis on languages, arts, and sciences, encouraging analytical thinking.</p><h2>Key Differences</h2><table><tr><th>Aspect</th><th>CBSE</th><th>ICSE</th></tr><tr><td>Curriculum Focus</td><td>Science & Math heavy</td><td>Balanced across subjects</td></tr><tr><td>Medium</td><td>English & Hindi</td><td>English only</td></tr><tr><td>Exam Pattern</td><td>Objective + Subjective</td><td>Mostly Subjective</td></tr><tr><td>Competitive Exam Prep</td><td>Directly aligned</td><td>Requires additional prep</td></tr><tr><td>English Proficiency</td><td>Moderate focus</td><td>Strong focus</td></tr><tr><td>Number of Schools</td><td>28,000+</td><td>2,300+</td></tr><tr><td>Transferability</td><td>Easy nationwide</td><td>Limited</td></tr></table><h2>Choose CBSE if:</h2><ul><li>Your family relocates frequently</li><li>Engineering or medical career is the goal</li><li>Competitive exam preparation is a priority</li></ul><h2>Choose ICSE if:</h2><ul><li>You want well-rounded education with strong English</li><li>Your child is interested in humanities or going abroad</li><li>You value in-depth subject knowledge</li></ul><h2>The Verdict</h2><p>There is no universally better board. The right choice depends on your child's learning style, career aspirations, and family circumstances.</p><blockquote>Use WIB's comparison tool to compare CBSE and ICSE schools in your city side by side.</blockquote>`},
            {id:"how-to-choose-right-school-india",title:"How to Choose the Right School for Your Child: A Complete Guide",slug:"how-to-choose-right-school-india",excerpt:"10 critical factors every parent should evaluate before choosing a school — from curriculum and fees to safety, teacher quality, and location.",category:"schools",author:"WIB Team",read_time:10,cover_image:"https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=800&h=400&fit=crop",status:"published",content:`<h2>Why School Selection Matters</h2><p>Your child will spend 14+ years in school. The school you choose shapes their academics, social skills, values, and career. Here are the 10 factors that actually matter.</p><h2>1. Board and Curriculum</h2><p>CBSE, ICSE, IB, Cambridge, or State Board — each has strengths. Choose based on your child's likely career path.</p><h2>2. Teaching Quality</h2><p>What is the student-teacher ratio? What qualifications do teachers hold? High teacher turnover is a red flag.</p><h2>3. Fee Structure and Hidden Costs</h2><p>The advertised fee is rarely the full cost. A school charging 2 lakhs/year may actually cost 3.5 lakhs with all extras.</p><h2>4. Safety and Security</h2><p>Check for CCTV, security personnel, visitor management, fire safety, and bus safety records.</p><h2>5. Infrastructure</h2><p>Well-equipped labs, libraries, sports facilities, and clean classrooms directly impact learning.</p><h2>6. Location and Commute</h2><p>School should ideally be within 30 minutes of home. Factor in traffic during school hours.</p><h2>7. Extracurricular Activities</h2><p>Sports, arts, music, debate, coding — check if these are genuinely available or just listed in brochures.</p><h2>8. Parent and Student Reviews</h2><p>Talk to at least 5 current parents before deciding.</p><h2>9. Academic Results</h2><p>Look beyond toppers. The average score tells you more than the highest score.</p><h2>10. School Culture</h2><p>Does the school prioritize competition or collaboration? Grades or growth? Spend a day observing.</p><blockquote>Compare schools across all these factors on WIB with verified information.</blockquote>`},
            {id:"top-engineering-colleges-india-2025",title:"Top Engineering Colleges in India 2025: Complete Ranking and Comparison",slug:"top-engineering-colleges-india-2025",excerpt:"Data-driven ranking of India's best engineering colleges by placements, fees, faculty, and student experience.",category:"colleges",author:"WIB Team",read_time:12,cover_image:"https://images.unsplash.com/photo-1562774053-701939374585?w=800&h=400&fit=crop",status:"published",content:`<h2>How We Ranked</h2><p>Our ranking is based on verifiable data: placement percentage, average package, student-faculty ratio, research output, and student reviews.</p><h2>Tier 1: The Elite</h2><p><strong>IIT Madras</strong> — No. 1 by NIRF. Avg 22 LPA. Fees under 1 lakh/year.</p><p><strong>IIT Bombay</strong> — Avg 23 LPA. Strongest alumni network in tech.</p><p><strong>IIT Delhi</strong> — Avg 24 LPA. Strong in CS and AI research.</p><p><strong>IISc Bangalore</strong> — India's premier research institution.</p><h2>Tier 2: Excellent Options</h2><p><strong>PSG Tech, Coimbatore</strong> — 92% placement, packages up to 44 LPA. Only 1.5L/year.</p><p><strong>RVCE, Bangalore</strong> — 92% placements, avg 12 LPA.</p><p><strong>DTU, Delhi</strong> — 93% placement, avg 16 LPA.</p><h2>Fees Comparison</h2><table><tr><th>College</th><th>Fees/Year</th><th>Avg Package</th><th>ROI</th></tr><tr><td>IIT Madras</td><td>1L</td><td>22 LPA</td><td>Excellent</td></tr><tr><td>IIT Bombay</td><td>1.1L</td><td>23 LPA</td><td>Excellent</td></tr><tr><td>PES University</td><td>4L</td><td>11 LPA</td><td>Good</td></tr><tr><td>SRM Chennai</td><td>3.5L</td><td>8 LPA</td><td>Average</td></tr><tr><td>PSG Tech</td><td>1.5L</td><td>8 LPA</td><td>Very Good</td></tr></table><blockquote>Use WIB's comparison tool to compare engineering colleges side by side.</blockquote>`},
            {id:"best-medical-colleges-india",title:"Beyond AIIMS: Best Medical Colleges in India and How to Choose",slug:"best-medical-colleges-india",excerpt:"A practical guide to India's top medical colleges — government and private options, fees, and what matters in medical education.",category:"colleges",author:"WIB Team",read_time:9,cover_image:"https://images.unsplash.com/photo-1551601651-2a8555f1a136?w=800&h=400&fit=crop",status:"published",content:`<h2>The Reality</h2><p>Over 18 lakh students appear for NEET yearly, competing for 1 lakh MBBS seats. While AIIMS Delhi is the dream, many excellent alternatives exist.</p><h2>Top Government Medical Colleges</h2><p><strong>AIIMS Delhi</strong> — Fees under 5,000/year. World-class research.</p><p><strong>Maulana Azad Medical College</strong> — Attached to Lok Nayak Hospital. Exceptional clinical exposure.</p><p><strong>Madras Medical College</strong> — Established 1835. Fees around 30,000/year.</p><p><strong>Grant Medical College, Mumbai</strong> — Attached to JJ Hospital.</p><h2>Government vs Private</h2><table><tr><th>Factor</th><th>Government</th><th>Private</th></tr><tr><td>Annual Fees</td><td>5K-50K</td><td>9-25 Lakh</td></tr><tr><td>Total MBBS Cost</td><td>25K-2.5L</td><td>45L-1.25 Cr</td></tr><tr><td>Clinical Exposure</td><td>Very High</td><td>Moderate</td></tr><tr><td>Patient Volume</td><td>Very High</td><td>Lower</td></tr></table><h2>What Matters</h2><ul><li>Clinical exposure — more patients = more learning</li><li>Faculty who publish research</li><li>Hospital affiliation matters more than college building</li><li>NEET PG preparation track record</li></ul><blockquote>Compare medical colleges on WIB — fees, facilities, and clinical exposure data.</blockquote>`},
            {id:"school-fees-india-guide-2025",title:"School Fees in India 2025: What Parents Actually Pay",slug:"school-fees-india-guide-2025",excerpt:"A transparent look at school fees across major cities. Hidden costs, fee hikes, and how to budget for your child's education.",category:"schools",author:"WIB Team",read_time:7,cover_image:"https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=800&h=400&fit=crop",status:"published",content:`<h2>The True Cost</h2><p>When a school says "fees are 1.5 lakhs per year," the actual cost is usually 2-3x higher.</p><h2>Fees by City (2025)</h2><table><tr><th>City</th><th>Budget</th><th>Mid-Range</th><th>Premium</th><th>International</th></tr><tr><td>Bangalore</td><td>40K-80K</td><td>1L-3L</td><td>3L-6L</td><td>6L-15L</td></tr><tr><td>Chennai</td><td>30K-60K</td><td>80K-2L</td><td>2L-5L</td><td>5L-12L</td></tr><tr><td>Delhi NCR</td><td>40K-1L</td><td>1L-3L</td><td>3L-7L</td><td>7L-20L</td></tr><tr><td>Mumbai</td><td>50K-1.2L</td><td>1.2L-4L</td><td>4L-8L</td><td>8L-20L</td></tr><tr><td>Coimbatore</td><td>20K-50K</td><td>50K-1.5L</td><td>1.5L-3L</td><td>3L-8L</td></tr></table><h2>Hidden Costs</h2><ul><li>Admission Fee: 10K to 5L (one-time)</li><li>Development Fee: 10K-50K/year</li><li>Transport: 15K-60K/year</li><li>Books: 5K-15K/year</li><li>Uniform: 3K-10K/year</li><li>Activities: 5K-30K/year</li><li>Annual Hike: 8-15% per year</li></ul><h2>Budget Planning</h2><p>A school with 2L fees today will charge 6-7L by Class 12 (10% annual increase). Total 14-year cost: approximately 55-60 lakhs per child.</p><blockquote>Compare school fees across cities on WIB. Filter by budget to find schools that fit.</blockquote>`}
        ];

        document.getElementById('loginBtn').addEventListener('click',async function(){
            const email=document.getElementById('email').value.trim();
            const pass=document.getElementById('password').value;
            if(!email||!pass){log('Please enter email and password.','e');return;}
            this.disabled=true;this.textContent='Logging in...';
            try{
                await signInWithEmailAndPassword(auth,email,pass);
                log('Logged in successfully!','s');
                log(`Creating ${articles.length} articles...`,'i');
                let ok=0;
                for(const a of articles){
                    try{const data={...a,created_at:serverTimestamp(),published_at:serverTimestamp(),updated_at:serverTimestamp()};const id=data.id;delete data.id;await setDoc(doc(db,"blog_posts",id),data);ok++;log(`[${ok}/${articles.length}] ${a.title}`,'s');}
                    catch(e){log(`FAILED: ${a.title} — ${e.message}`,'e');}
                }
                log(`\nDone! ${ok} articles created.`,'s');
                this.textContent='Complete';
            }catch(e){log('Login failed: '+e.message,'e');this.disabled=false;this.textContent='Login & Seed Articles';}
        });
    </script>
