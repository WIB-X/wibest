function log(msg,type){var el=document.getElementById('log');el.innerHTML+='<span class="'+(type||'info')+'">'+msg+'</span>\n';el.scrollTop=el.scrollHeight}

async function seed(){
  var btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Adding...';
  var added=0;
  for(var i=0;i<V.length;i++){
    try{
      var ex=await db.collection('vehicles').where('name','==',V[i].name).get();
      if(!ex.empty){log('SKIP (exists): '+V[i].name,'info');continue}
      await db.collection('vehicles').add(V[i]);
      added++;
      log('Added: '+V[i].name+' ('+V[i].brand+', Rs '+V[i].price+')','ok');
    }catch(e){log('ERROR: '+V[i].name+' - '+e.message,'err')}
  }
  log('\nDone! Added '+added+' vehicles.','ok');
  btn.textContent='Done ('+added+' added)';
}
