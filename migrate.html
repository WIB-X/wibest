async function startMigration() {
  const btn = document.getElementById("migrateBtn");
  const log = document.getElementById("log");
  const progress = document.getElementById("progress");
  btn.disabled = true;

  log.innerHTML = '<span class="info">Starting migration of ' + schoolsData.length + ' schools...</span>\n';

  let success = 0;
  let failed = 0;

  for (let i = 0; i < schoolsData.length; i++) {
    const school = schoolsData[i];
    try {
      const docData = {
        ...school,
        category: "schools",
        subcategory: school.type,
        slug: school.id.toLowerCase(),
        country: "India",
        is_active: true,
        is_verified: false,
        is_featured: false,
        status: "published",
        wibest_score: school.rating,
        user_rating: school.rating,
        total_reviews: school.reviewsCount,
        total_views: 0,
        total_comparisons: 0,
        price: school.fees,
        price_unit: "INR/year",
        coordinates: { lat: school.lat || null, lng: school.lng || null },
        created_at: serverTimestamp(),
        updated_at: serverTimestamp()
      };

      await setDoc(doc(collection(db, "items"), school.id), docData);
      success++;
      progress.textContent = `Migrating... ${i + 1}/${schoolsData.length}`;
      log.innerHTML += `<span class="success">✅ [${i+1}/${schoolsData.length}] ${school.name}</span>\n`;
    } catch (err) {
      failed++;
      log.innerHTML += `<span class="error">❌ FAILED: ${school.name} — ${err.message}</span>\n`;
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 100));
  }

  progress.textContent = `✅ Done! ${success} migrated, ${failed} failed.`;
  log.innerHTML += `\n<span class="info">🎉 Migration complete! Check your Firestore console.</span>`;
  btn.textContent = "Migration Complete";
};
document.getElementById('migrateBtn').addEventListener('click', startMigration);
