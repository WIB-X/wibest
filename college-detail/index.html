<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Details — WIB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#0F172A;--navy-light:#1E293B;--slate-700:#334155;--slate-600:#475569;--slate-500:#64748B;--slate-400:#94A3B8;--slate-300:#CBD5E1;--slate-200:#E2E8F0;--slate-100:#F1F5F9;--slate-50:#F8FAFC;--blue:#3B82F6;--blue-dark:#2563EB;--blue-50:#EFF6FF;--green:#16A34A;--green-50:#F0FDF4;--green-100:#DCFCE7;--amber:#D97706;--purple:#7C3AED;--white:#FFF;--radius-lg:14px;--shadow-md:0 4px 16px rgba(0,0,0,0.08);}
        *{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',-apple-system,sans-serif;color:var(--navy);background:var(--slate-50);line-height:1.6;-webkit-font-smoothing:antialiased;}
        .nav-top{display:flex;align-items:center;justify-content:space-between;padding:12px 48px;background:var(--white);border-bottom:1px solid var(--slate-200);position:sticky;top:0;z-index:100;}.logo{text-decoration:none;display:flex;align-items:center;}.logo-img{height:68px;width:auto;}.nav-links{display:flex;gap:28px;align-items:center;}.nav-links a{text-decoration:none;color:var(--slate-600);font-weight:500;font-size:14px;}.nav-links a:hover{color:var(--navy);}.btn-nav{background:var(--navy);color:var(--white);padding:9px 20px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;}
        .nav-categories{display:flex;gap:0;padding:0 48px;background:var(--slate-50);border-bottom:1px solid var(--slate-200);overflow-x:auto;scrollbar-width:none;}.nav-categories::-webkit-scrollbar{display:none;}.nav-cat{text-decoration:none;color:var(--slate-500);font-weight:500;font-size:13px;padding:10px 16px;white-space:nowrap;border-bottom:2px solid transparent;}.nav-cat:hover{color:var(--navy);}.nav-cat.active{color:var(--blue);border-bottom-color:var(--blue);}.nav-cat-soon{font-size:10px;font-weight:700;color:var(--slate-400);background:var(--slate-200);padding:1px 6px;border-radius:4px;margin-left:6px;}
        .breadcrumb{padding:12px 48px;font-size:12px;color:var(--slate-400);background:var(--white);border-bottom:1px solid var(--slate-100);}.breadcrumb a{color:var(--blue);text-decoration:none;font-weight:500;}.breadcrumb span{margin:0 6px;}
        .college-hero{background:var(--navy);padding:44px 48px;color:var(--white);}.hero-inner{max-width:1200px;margin:0 auto;}.college-hero h1{font-size:30px;font-weight:800;margin-bottom:6px;letter-spacing:-0.02em;}.hero-city{font-size:14px;color:var(--slate-400);margin-bottom:18px;}.hero-badges{display:flex;gap:8px;flex-wrap:wrap;}.hero-badge{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.08);color:var(--slate-300);letter-spacing:0.03em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.1);}
        .content{max-width:1200px;margin:0 auto;padding:28px 48px 64px;display:grid;grid-template-columns:1fr 360px;gap:24px;}.main{display:flex;flex-direction:column;gap:20px;}.sidebar{display:flex;flex-direction:column;gap:20px;}
        .card{background:var(--white);border:1px solid var(--slate-200);border-radius:var(--radius-lg);overflow:hidden;}.card-head{padding:18px 22px 0;display:flex;align-items:center;gap:10px;margin-bottom:16px;}.card-head svg{width:18px;height:18px;stroke:var(--slate-500);fill:none;stroke-width:1.8;}.card-head h2{font-size:16px;font-weight:700;color:var(--navy);}.card-body{padding:0 22px 22px;}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.info-item{padding:10px 12px;background:var(--slate-50);border-radius:8px;}.info-label{font-size:10px;font-weight:600;color:var(--slate-400);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;}.info-value{font-size:14px;font-weight:600;color:var(--navy);}
        .courses-list{display:flex;flex-wrap:wrap;gap:6px;}.course-tag{padding:4px 10px;background:var(--slate-50);border:1px solid var(--slate-200);border-radius:6px;font-size:12px;font-weight:500;color:var(--slate-600);}
        .scard{background:var(--white);border:1px solid var(--slate-200);border-radius:var(--radius-lg);padding:20px;}.scard h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--navy);display:flex;align-items:center;gap:8px;}.scard h3 svg{width:16px;height:16px;stroke:var(--slate-500);fill:none;stroke-width:1.8;}
        .fee-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--slate-100);font-size:13px;}.fee-row:last-child{border-bottom:none;}.fee-label{color:var(--slate-500);}.fee-value{font-weight:700;color:var(--navy);}
        .map-box{border-radius:8px;overflow:hidden;height:220px;background:var(--slate-100);}.map-box iframe{width:100%;height:100%;border:0;}
        .btn-back{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--white);border:1px solid var(--slate-200);color:var(--navy);border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;}.btn-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
        .loading-container{text-align:center;padding:100px 20px;grid-column:1/-1;}.spinner{width:32px;height:32px;border:2.5px solid var(--slate-200);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px;}@keyframes spin{to{transform:rotate(360deg);}}
        .footer{background:var(--navy);color:var(--slate-500);text-align:center;padding:28px;font-size:13px;}
        .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;}.hamburger svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2;}.mobile-menu{display:none;position:fixed;inset:0;background:var(--white);z-index:200;padding:20px;flex-direction:column;}.mobile-menu.open{display:flex;}.mobile-menu-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}.mobile-menu-close{background:none;border:none;cursor:pointer;padding:4px;}.mobile-menu-close svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2;}.mobile-menu a{display:block;padding:14px 0;font-size:18px;font-weight:600;color:var(--navy);text-decoration:none;border-bottom:1px solid var(--slate-100);}.mobile-menu a:hover{color:var(--blue);}
        .hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;}.hamburger svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2;}.mobile-menu{display:none;position:fixed;inset:0;background:var(--white);z-index:200;padding:20px;flex-direction:column;}.mobile-menu.open{display:flex;}.mobile-menu-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;}.mobile-menu-close{background:none;border:none;cursor:pointer;padding:4px;}.mobile-menu-close svg{width:24px;height:24px;stroke:var(--navy);fill:none;stroke-width:2;}.mobile-menu a{display:block;padding:14px 0;font-size:18px;font-weight:600;color:var(--navy);text-decoration:none;border-bottom:1px solid var(--slate-100);}.mobile-menu a:hover{color:var(--blue);}@media(max-width:768px){.hamburger{display:block;}.logo-img{height:48px;}.btn-nav{padding:7px 14px;font-size:12px;}.nav-cat{padding:8px 10px;font-size:12px;}.nav-top{padding:10px 20px;}.nav-links{display:none;}.college-hero{padding:28px 20px;}.college-hero h1{font-size:24px;}.content{grid-template-columns:1fr;padding:20px;}.info-grid{grid-template-columns:1fr;}}
    </style>.hamburger{display:block;}.logo-img{height:48px!important;}
</head>
<body>
    <nav class="nav-top"><a href="/" class="logo"><img src="/logo.png" alt="WIB" class="logo-img"></a><div class="nav-links"><a href="/">Home</a><a href="/about">About</a><a href="/contact">Contact</a></div><button class="hamburger" onclick="document.getElementById('mobileMenu').classList.add('open')"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button><a href="/compare" class="btn-nav">Explore</a></nav>
    <div class="mobile-menu" id="mobileMenu"><div class="mobile-menu-top"><a href="/" class="logo"><img src="/logo.png" alt="WIB" class="logo-img" style="height:48px;"></a><button class="mobile-menu-close" onclick="document.getElementById('mobileMenu').classList.remove('open')"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><a href="/">Home</a><a href="/schools">Schools</a><a href="/colleges">Colleges</a><a href="/compare">Compare</a><a href="/blog">Blog</a><a href="/about">About</a><a href="/contact">Contact</a><a href="/connect">Connect</a></div>
    <div class="nav-categories"><a href="/schools" class="nav-cat">Schools</a><a href="/colleges" class="nav-cat active">Colleges</a><a href="#" class="nav-cat">Electronics<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Cars & Bikes<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Places<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Travel<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Restaurants<span class="nav-cat-soon">SOON</span></a></div>
    <div id="pageContent"><div class="loading-container"><div class="spinner"></div><p style="color:var(--slate-400);font-size:14px;">Loading college details...</p></div></div>
    <footer class="footer">WIB &mdash; Independent. Data-driven.</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        const fc={apiKey:"AIzaSyA_IcdzywseRgXTY8MqiOY1LLfwnfps3Oo",authDomain:"wibest-449fe.firebaseapp.com",projectId:"wibest-449fe",storageBucket:"wibest-449fe.firebasestorage.app",messagingSenderId:"438027122345",appId:"1:438027122345:web:70b5427de9bf0a74f51bb8"};
        const db=getFirestore(initializeApp(fc));
        function fmt(a){if(!a||a==='N/A')return'Contact College';const n=parseInt(a);return isNaN(n)?a:'\u20B9'+n.toLocaleString('en-IN');}
        function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}

        function render(c){
            const stream=c.stream||'',type=c.college_type||c.subcategory||'',accr=c.accreditation||'',city=c.city||'',state=c.state||'',est=c.established_year||'';
            const desc=c.description||c.long_description||'',website=c.website||'',fee=c.fee_tuition||c.fees||c.price||'';
            const pkg=c.avg_package||'',place=c.placement_percentage||'',highest=c.highest_package||'';
            const courses=c.courses_offered||[],lat=c.coordinates?.lat||0,lng=c.coordinates?.lng||0;
            document.title=`${c.name} — WIB`;
            document.getElementById('pageContent').innerHTML=`
                <div class="breadcrumb"><a href="/">Home</a><span>/</span><a href="/colleges">Colleges</a><span>/</span>${c.name}</div>
                <div class="college-hero"><div class="hero-inner"><h1>${c.name}</h1><div class="hero-city">${cap(city)}${state?', '+state:''}, India${est?' &middot; Established '+est:''}</div>
                <div class="hero-badges">${stream?`<span class="hero-badge">${stream}</span>`:''}${type?`<span class="hero-badge">${type}</span>`:''}${accr?`<span class="hero-badge">${Array.isArray(accr)?accr.join(', '):accr}</span>`:''}</div></div></div>
                <div class="content"><div class="main">
                    ${desc?`<div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h2>About</h2></div><div class="card-body"><p style="font-size:14px;color:var(--slate-600);line-height:1.7;">${desc}</p></div></div>`:''}
                    <div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><h2>Details</h2></div><div class="card-body"><div class="info-grid">
                        ${stream?`<div class="info-item"><div class="info-label">Stream</div><div class="info-value">${stream}</div></div>`:''}
                        ${type?`<div class="info-item"><div class="info-label">Type</div><div class="info-value">${type}</div></div>`:''}
                        ${place?`<div class="info-item"><div class="info-label">Placements</div><div class="info-value">${place}</div></div>`:''}
                        ${pkg?`<div class="info-item"><div class="info-label">Avg package</div><div class="info-value">${pkg}</div></div>`:''}
                        ${highest?`<div class="info-item"><div class="info-label">Highest package</div><div class="info-value">${highest}</div></div>`:''}
                        ${accr?`<div class="info-item"><div class="info-label">Accreditation</div><div class="info-value">${Array.isArray(accr)?accr.join(', '):accr}</div></div>`:''}
                    </div></div></div>
                    ${courses.length?`<div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><h2>Courses offered</h2></div><div class="card-body"><div class="courses-list">${courses.map(c=>`<span class="course-tag">${c}</span>`).join('')}</div></div></div>`:''}
                    ${lat&&lng?`<div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><h2>Location</h2></div><div class="card-body"><div class="map-box"><iframe src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed" allowfullscreen loading="lazy"></iframe></div></div></div>`:''}
                    <a href="/colleges" class="btn-back"><svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>Back to all colleges</a>
                </div><div class="sidebar">
                    <div class="scard"><h3><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Fee structure</h3><div class="fee-row"><span class="fee-label">Tuition (Annual)</span><span class="fee-value">${fee?fmt(fee):'Contact College'}</span></div></div>
                    ${website?`<div class="scard"><h3><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Website</h3><a href="${website}" target="_blank" style="color:var(--blue);text-decoration:none;font-size:13px;font-weight:500;">${website.replace('https://','').replace('http://','')}</a></div>`:''}
                </div></div>`;
        }
        (async()=>{const id=new URLSearchParams(window.location.search).get('id');if(!id){document.getElementById('pageContent').innerHTML='<div class="loading-container"><p style="color:var(--slate-400);">No college selected. <a href="/colleges" style="color:var(--blue);">Browse colleges</a></p></div>';return;}try{const snap=await getDoc(doc(db,"items",id));if(snap.exists())render({id:snap.id,...snap.data()});else document.getElementById('pageContent').innerHTML='<div class="loading-container"><p style="color:var(--slate-400);">College not found. <a href="/colleges" style="color:var(--blue);">Browse colleges</a></p></div>';}catch(e){document.getElementById('pageContent').innerHTML=`<div class="loading-container"><p style="color:var(--slate-400);">${e.message}</p></div>`;}})();
    </script>
</body>
</html>
