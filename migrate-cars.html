const cars=vehicles.filter(v=>v.subcategory==='car');
const bikes=vehicles.filter(v=>v.subcategory==='bike');
document.getElementById('carCount').textContent=cars.length;
document.getElementById('bikeCount').textContent=bikes.length;
document.getElementById('totalCount').textContent=vehicles.length;

const logEl=document.getElementById('log');
function log(t,c=''){logEl.innerHTML+=`<div class="${c}">${t}</div>`;logEl.scrollTop=logEl.scrollHeight}

async function startMigration(){
  const email=document.getElementById('email').value,pass=document.getElementById('password').value,btn=document.getElementById('startBtn');
  if(!email||!pass){alert('Enter email and password');return}
  btn.disabled=true;btn.textContent='Logging in...';logEl.style.display='block';log('Logging in...','info');
  try{await auth.signInWithEmailAndPassword(email,pass);log('Logged in','ok')}
  catch(e){log('Login failed: '+e.message,'err');btn.disabled=false;btn.textContent='Login & Start Migration';return}
  btn.textContent='Migrating...';log('Starting migration of '+vehicles.length+' vehicles...','info');
  let ok=0,fail=0;const bar=document.getElementById('progressBar');
  for(let i=0;i<vehicles.length;i++){
    const v=vehicles[i];const id=v.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
    try{await db.collection('vehicles').doc(id).set({...v,category:'vehicle',created_at:firebase.firestore.FieldValue.serverTimestamp()});ok++;log(`[${i+1}/${vehicles.length}] ${v.name} — OK`,'ok')}
    catch(e){fail++;log(`[${i+1}/${vehicles.length}] ${v.name} — FAILED: ${e.message}`,'err')}
    bar.style.width=((i+1)/vehicles.length*100)+'%';
  }
  log(`\nDone: ${ok} success, ${fail} failed`,'info');btn.textContent=`Done — ${ok} vehicles migrated`;
}
