<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Details — WIBest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --blue-light: #dbeafe;
            --blue-50: #eff6ff;
            --ink: #0f172a;
            --ink-light: #475569;
            --ink-muted: #94a3b8;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --green: #16a34a;
            --green-light: #f0fdf4;
            --amber: #b45309;
            --amber-light: #fef3c7;
            --red: #dc2626;
            --red-light: #fef2f2;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 32px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--ink);
            background: var(--gray-50);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Navbar ── */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 48px; background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { text-decoration: none; display: flex; align-items: center; }
        .logo-img { height: 52px; width: auto; }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--ink-light); font-weight: 500; font-size: 15px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--blue); }
        .btn-primary {
            background: var(--blue); color: white; padding: 10px 24px;
            border-radius: 8px; text-decoration: none; font-weight: 600;
            font-size: 14px; transition: background 0.2s; border: none; cursor: pointer;
        }
        .btn-primary:hover { background: var(--blue-dark); }

        /* ── Breadcrumb ── */
        .breadcrumb {
            padding: 16px 48px;
            font-size: 14px;
            color: var(--ink-muted);
            background: var(--white);
            border-bottom: 1px solid var(--gray-100);
        }
        .breadcrumb a { color: var(--blue); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }

        /* ── Hero Banner ── */
        .school-hero {
            background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
            padding: 48px;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .school-hero::after {
            content: '';
            position: absolute; top: -60px; right: -60px;
            width: 200px; height: 200px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .school-hero::before {
            content: '';
            position: absolute; bottom: -40px; left: 30%;
            width: 150px; height: 150px;
            background: rgba(255,255,255,0.04);
            border-radius: 50%;
        }
        .school-hero h1 {
            font-size: 36px; font-weight: 800;
            margin-bottom: 8px; position: relative; z-index: 1;
        }
        .hero-city {
            font-size: 18px; opacity: 0.9;
            margin-bottom: 20px; position: relative; z-index: 1;
        }
        .hero-badges {
            display: flex; gap: 10px; flex-wrap: wrap;
            position: relative; z-index: 1;
        }
        .hero-badge {
            padding: 6px 14px; border-radius: 8px;
            font-size: 13px; font-weight: 600;
            background: rgba(255,255,255,0.15);
            color: white; backdrop-filter: blur(4px);
        }

        /* ── Content ── */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 48px 64px;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 32px;
        }

        /* ── Main Content ── */
        .main-content { display: flex; flex-direction: column; gap: 24px; }

        .info-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 28px;
            transition: box-shadow 0.2s;
        }
        .info-card:hover { box-shadow: var(--shadow-md); }

        .info-card h2 {
            font-size: 20px; font-weight: 700;
            color: var(--ink); margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--blue-light);
            display: flex; align-items: center; gap: 10px;
        }
        .info-card h2 .icon { font-size: 22px; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .info-item { display: flex; flex-direction: column; gap: 2px; }
        .info-label {
            font-size: 12px; font-weight: 600;
            color: var(--ink-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            font-size: 15px; font-weight: 600;
            color: var(--ink);
        }

        /* Facilities */
        .facilities-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }
        .facility-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px; font-weight: 500;
        }
        .facility-yes {
            background: var(--green-light);
            color: var(--green);
        }
        .facility-no {
            background: var(--gray-100);
            color: var(--ink-muted);
        }

        /* Description */
        .description-text {
            font-size: 15px;
            line-height: 1.8;
            color: var(--ink-light);
        }

        /* ── Sidebar ── */
        .sidebar { display: flex; flex-direction: column; gap: 24px; }

        .sidebar-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 24px;
        }
        .sidebar-card h3 {
            font-size: 16px; font-weight: 700;
            margin-bottom: 16px; color: var(--ink);
        }

        .fee-row {
            display: flex; justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-100);
            font-size: 14px;
        }
        .fee-row:last-child { border-bottom: none; }
        .fee-label { color: var(--ink-light); }
        .fee-value { font-weight: 700; color: var(--ink); }

        .contact-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--gray-100);
            font-size: 14px; color: var(--ink-light);
        }
        .contact-item:last-child { border-bottom: none; }
        .contact-icon { font-size: 18px; }
        .contact-item a { color: var(--blue); text-decoration: none; }
        .contact-item a:hover { text-decoration: underline; }

        .btn-back {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 12px 24px; background: var(--gray-100);
            color: var(--ink); border-radius: 8px;
            text-decoration: none; font-weight: 600; font-size: 14px;
            transition: background 0.2s;
        }
        .btn-back:hover { background: var(--gray-200); }

        /* ── Loading / Error ── */
        .loading-container { text-align: center; padding: 120px 20px; grid-column: 1 / -1; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--gray-200);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--ink-muted); font-size: 15px; }

        /* ── Footer ── */
        .footer {
            background: var(--ink); color: rgba(255,255,255,0.6);
            text-align: center; padding: 32px; font-size: 14px;
        }
        .footer strong { color: white; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .navbar { padding: 14px 20px; }
            .nav-links { display: none; }
            .breadcrumb { padding: 12px 20px; }
            .school-hero { padding: 32px 20px; }
            .school-hero h1 { font-size: 26px; }
            .content-wrapper {
                grid-template-columns: 1fr;
                padding: 20px;
            }
            .info-grid { grid-template-columns: 1fr; }
            .facilities-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="logo"><img src="logo.png" alt="WIBest" class="logo-img"></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="schools.html">Schools</a>
            <a href="colleges.html">Colleges</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
        <a href="schools.html" class="btn-primary">Explore Now →</a>
    </nav>

    <!-- Page Content -->
    <div id="pageContent">
        <div class="loading-container">
            <div class="spinner"></div>
            <p class="loading-text">Loading school details...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2025 <strong>WIBest</strong> — India's Comparison Platform. Independent. Ad-free. Always.</p>
    </footer>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_IcdzywseRgXTY8MqiOY1LLfwnfps3Oo",
            authDomain: "wibest-449fe.firebaseapp.com",
            projectId: "wibest-449fe",
            storageBucket: "wibest-449fe.firebasestorage.app",
            messagingSenderId: "438027122345",
            appId: "1:438027122345:web:70b5427de9bf0a74f51bb8",
            measurementId: "G-BFR8V7605K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function formatFee(amount) {
            if (!amount || amount === 'N/A') return 'Contact School';
            const num = parseInt(amount);
            if (isNaN(num)) return amount;
            return '₹' + num.toLocaleString('en-IN');
        }

        function facilityHTML(name, hasIt) {
            return `<div class="facility-item ${hasIt ? 'facility-yes' : 'facility-no'}">
                ${hasIt ? '✅' : '❌'} ${name}
            </div>`;
        }

        function renderSchool(school) {
            const s = school;
            const board = s.board || 'N/A';
            const type = s.school_type || s.type || 'Day School';
            const gender = s.gender_type || s.gender || 'Co-ed';
            const city = s.city || '';
            const state = s.state || '';
            const established = s.established_year || s.established || s.establishedYear || '';
            const grades = s.grades_offered || s.grades || s.gradesOffered || '';
            const ratio = s.student_teacher_ratio || s.studentTeacherRatio || '';
            const students = s.total_students || s.totalStudents || '';
            const teachers = s.total_teachers || s.totalTeachers || '';
            const campus = s.campus_area_acres || s.campusArea || '';
            const passPercent = s.pass_percentage || s.boardResults || '';
            const admissionMonths = s.admission_months || s.admissionMonths || '';
            const description = s.long_description || s.description || s.shortDescription || '';
            const website = s.website || '';
            const phone = s.phone || s.contact || '';
            const email = s.email || '';
            const address = s.address || '';

            // Fees
            const feeTuition = s.fee_tuition || s.fees || s.price || '';
            const feeTransport = s.fee_transport || s.transportFee || '';
            const feeHostel = s.fee_hostel || '';

            // Facilities
            const hasTransport = s.has_transport || s.hasTransport || false;
            const hasHostel = s.has_hostel || s.hasHostel || false;
            const hasLab = s.has_lab || s.hasLab || s.facilities?.lab || false;
            const hasSports = s.has_sports || s.hasSports || s.facilities?.sports || false;
            const hasPool = s.has_swimming_pool || s.hasPool || s.facilities?.swimmingPool || false;
            const hasCCTV = s.has_cctv || s.hasCCTV || false;
            const hasSecurity = s.has_security || s.hasSecurity || false;
            const hasLibrary = s.facilities?.library || false;
            const hasArts = s.facilities?.arts || false;

            document.title = `${s.name} — WIBest`;

            document.getElementById('pageContent').innerHTML = `
                <!-- Breadcrumb -->
                <div class="breadcrumb">
                    <a href="index.html">Home</a> → <a href="schools.html">Schools</a> → ${s.name}
                </div>

                <!-- Hero -->
                <div class="school-hero">
                    <h1>${s.name}</h1>
                    <div class="hero-city">📍 ${city}${state ? ', ' + state : ''}, India</div>
                    <div class="hero-badges">
                        ${board !== 'N/A' ? `<span class="hero-badge">${board}</span>` : ''}
                        <span class="hero-badge">${type}</span>
                        <span class="hero-badge">${gender}</span>
                        ${established ? `<span class="hero-badge">Est. ${established}</span>` : ''}
                    </div>
                </div>

                <!-- Content -->
                <div class="content-wrapper">
                    <!-- Main -->
                    <div class="main-content">

                        ${description ? `
                        <div class="info-card">
                            <h2><span class="icon">📋</span> About This School</h2>
                            <p class="description-text">${description}</p>
                        </div>` : ''}

                        <div class="info-card">
                            <h2><span class="icon">🎓</span> Academic Details</h2>
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">Board</span>
                                    <span class="info-value">${board}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">School Type</span>
                                    <span class="info-value">${type}</span>
                                </div>
                                ${grades ? `<div class="info-item">
                                    <span class="info-label">Grades Offered</span>
                                    <span class="info-value">${Array.isArray(grades) ? grades.join(', ') : grades}</span>
                                </div>` : ''}
                                ${ratio ? `<div class="info-item">
                                    <span class="info-label">Student-Teacher Ratio</span>
                                    <span class="info-value">${ratio}</span>
                                </div>` : ''}
                                ${students ? `<div class="info-item">
                                    <span class="info-label">Total Students</span>
                                    <span class="info-value">${students}</span>
                                </div>` : ''}
                                ${teachers ? `<div class="info-item">
                                    <span class="info-label">Total Teachers</span>
                                    <span class="info-value">${teachers}</span>
                                </div>` : ''}
                                ${passPercent ? `<div class="info-item">
                                    <span class="info-label">Board Results</span>
                                    <span class="info-value">${passPercent}</span>
                                </div>` : ''}
                                ${admissionMonths ? `<div class="info-item">
                                    <span class="info-label">Admission Period</span>
                                    <span class="info-value">${Array.isArray(admissionMonths) ? admissionMonths.join(', ') : admissionMonths}</span>
                                </div>` : ''}
                                ${campus ? `<div class="info-item">
                                    <span class="info-label">Campus Area</span>
                                    <span class="info-value">${campus} acres</span>
                                </div>` : ''}
                                <div class="info-item">
                                    <span class="info-label">Gender</span>
                                    <span class="info-value">${gender}</span>
                                </div>
                            </div>
                        </div>

                        <div class="info-card">
                            <h2><span class="icon">🏫</span> Facilities</h2>
                            <div class="facilities-grid">
                                ${facilityHTML('Transport', hasTransport)}
                                ${facilityHTML('Hostel / Boarding', hasHostel)}
                                ${facilityHTML('Science Lab', hasLab)}
                                ${facilityHTML('Sports', hasSports)}
                                ${facilityHTML('Swimming Pool', hasPool)}
                                ${facilityHTML('CCTV', hasCCTV)}
                                ${facilityHTML('Security', hasSecurity)}
                                ${facilityHTML('Library', hasLibrary)}
                                ${facilityHTML('Arts / Music', hasArts)}
                            </div>
                        </div>

                        <a href="schools.html" class="btn-back">← Back to All Schools</a>
                    </div>

                    <!-- Sidebar -->
                    <div class="sidebar">

                        <div class="sidebar-card">
                            <h3>💰 Fee Structure</h3>
                            <div class="fee-row">
                                <span class="fee-label">Tuition (Annual)</span>
                                <span class="fee-value">${feeTuition ? formatFee(feeTuition) : 'Contact School'}</span>
                            </div>
                            ${feeTransport ? `<div class="fee-row">
                                <span class="fee-label">Transport (Annual)</span>
                                <span class="fee-value">${formatFee(feeTransport)}</span>
                            </div>` : ''}
                            ${feeHostel ? `<div class="fee-row">
                                <span class="fee-label">Hostel (Annual)</span>
                                <span class="fee-value">${formatFee(feeHostel)}</span>
                            </div>` : ''}
                        </div>

                        <div class="sidebar-card">
                            <h3>📞 Contact Information</h3>
                            ${address ? `<div class="contact-item">
                                <span class="contact-icon">📍</span>
                                <span>${address}</span>
                            </div>` : ''}
                            ${phone ? `<div class="contact-item">
                                <span class="contact-icon">📱</span>
                                <span>${phone}</span>
                            </div>` : ''}
                            ${email ? `<div class="contact-item">
                                <span class="contact-icon">✉️</span>
                                <a href="mailto:${email}">${email}</a>
                            </div>` : ''}
                            ${website ? `<div class="contact-item">
                                <span class="contact-icon">🌐</span>
                                <a href="${website}" target="_blank">${website.replace('https://', '').replace('http://', '')}</a>
                            </div>` : ''}
                            ${!address && !phone && !email && !website ? '<p style="color:var(--ink-muted);font-size:14px;">Contact info not yet available</p>' : ''}
                        </div>

                    </div>
                </div>
            `;
        }

        // Load school from Firestore
        async function loadSchool() {
            const params = new URLSearchParams(window.location.search);
            const schoolId = params.get('id');

            if (!schoolId) {
                document.getElementById('pageContent').innerHTML = `
                    <div class="loading-container">
                        <p style="font-size:48px;margin-bottom:16px;">⚠️</p>
                        <p class="loading-text">No school selected. <a href="schools.html" style="color:var(--blue);">Browse all schools →</a></p>
                    </div>
                `;
                return;
            }

            try {
                const docRef = doc(db, "items", schoolId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    renderSchool({ id: docSnap.id, ...docSnap.data() });
                } else {
                    document.getElementById('pageContent').innerHTML = `
                        <div class="loading-container">
                            <p style="font-size:48px;margin-bottom:16px;">🔍</p>
                            <p class="loading-text">School not found. <a href="schools.html" style="color:var(--blue);">Browse all schools →</a></p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('pageContent').innerHTML = `
                    <div class="loading-container">
                        <p style="font-size:48px;margin-bottom:16px;">⚠️</p>
                        <p class="loading-text">Error loading school: ${error.message}</p>
                    </div>
                `;
            }
        }

        loadSchool();
    </script>

</body>
</html>
