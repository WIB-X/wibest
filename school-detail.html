<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://wibest.in/school-detail/school-detail.html">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Details — WIB</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
.content{max-width:1200px;margin:calc(var(--nav-height)+var(--cat-height)+24px) auto 60px;padding:0 24px}
.breadcrumb{font-size:13px;color:var(--text-muted);margin-bottom:20px}
.breadcrumb a{color:var(--accent)}
.detail-grid{display:grid;grid-template-columns:1fr 360px;gap:24px}
.hero-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;transition:background .3s}
.school-name{font-family:'Outfit',sans-serif;font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px}
.school-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.badge{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;background:var(--tag-bg);color:var(--tag-text)}
.badge.board{background:var(--accent-light);color:var(--accent)}
.badge.rating{background:var(--green-bg);color:var(--green)}
.school-desc{color:var(--text-secondary);font-size:14px;line-height:1.7;margin-bottom:20px}
.section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-top:20px;transition:background .3s}
.section-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2}
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.info-item{padding:12px 16px;background:var(--bg-secondary);border-radius:8px;transition:background .3s}
.info-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.info-value{font-size:14px;font-weight:600}
.fac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.fac-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;background:var(--bg-secondary);font-size:13px;font-weight:500}
.fac-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fac-icon.yes{background:var(--green-bg);color:var(--green)}
.fac-icon.no{background:#fef2f2;color:var(--red)}
.fac-icon svg{width:12px;height:12px;fill:currentColor}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.gallery-img{width:100%;height:160px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.gallery-empty{color:var(--text-muted);font-size:14px;padding:24px;text-align:center;background:var(--bg-secondary);border-radius:8px}
.rating-overview{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.rating-source{flex:1;min-width:140px;padding:16px;border-radius:8px;background:var(--bg-secondary);text-align:center}
.rating-source .score{font-size:28px;font-weight:700}
.rating-source .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.rating-source .link{font-size:12px;color:var(--accent);margin-top:6px;display:inline-block}
.review-empty{color:var(--text-muted);font-size:14px;padding:16px;text-align:center;background:var(--bg-secondary);border-radius:8px}
.review-item{padding:14px;background:var(--bg-secondary);border-radius:8px;margin-bottom:8px}
.review-header{display:flex;justify-content:space-between;margin-bottom:6px}
.review-name{font-weight:600;font-size:14px}
.review-stars{color:var(--green);font-weight:600;font-size:13px}
.review-text{font-size:13px;color:var(--text-secondary)}
.review-date{font-size:11px;color:var(--text-muted);margin-top:4px}
/* Easy review form */
.review-form{background:var(--bg-secondary);border-radius:8px;padding:20px;margin-top:16px}
.review-form h4{font-size:15px;font-weight:600;margin-bottom:12px}
.rf-row{display:flex;gap:12px;margin-bottom:12px}
.rf-row input,.rf-row textarea{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);color:var(--text-primary);font-family:inherit;font-size:14px;transition:border .2s}
.rf-row input:focus,.rf-row textarea:focus{outline:none;border-color:var(--accent)}
.rf-row textarea{resize:vertical;min-height:70px}
.star-select{display:flex;gap:4px;margin-bottom:12px}
.star-select button{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);cursor:pointer;font-size:16px;transition:all .2s;color:var(--text-muted)}
.star-select button.active{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.star-select button:hover{border-color:var(--green)}
.rf-type{display:flex;gap:8px;margin-bottom:12px}
.rf-type button{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-family:inherit;font-size:13px;cursor:pointer;transition:all .2s}
.rf-type button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.form-msg{font-size:13px;text-align:center;padding:8px;border-radius:6px;margin-top:8px}
.form-msg.success{background:var(--green-bg);color:var(--green)}
.form-msg.error{background:#fef2f2;color:var(--red)}
/* Sidebar */
.sidebar{display:flex;flex-direction:column;gap:20px}
.sidebar-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:background .3s}
.sidebar-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin-bottom:12px}
.enquiry-form{display:flex;flex-direction:column;gap:12px}
.enquiry-form input,.enquiry-form textarea,.enquiry-form select{padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;font-size:14px;transition:border .2s}
.enquiry-form input:focus,.enquiry-form textarea:focus,.enquiry-form select:focus{outline:none;border-color:var(--accent)}
.enquiry-form textarea{resize:vertical;min-height:80px}
.map-frame{width:100%;height:220px;border:none;border-radius:8px;background:var(--bg-secondary)}
.strength-list{display:flex;flex-direction:column;gap:8px}
.strength-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--bg-secondary);border-radius:8px;font-size:13px}
.strength-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.program-tags{display:flex;flex-wrap:wrap;gap:8px}
.program-tag{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;background:var(--accent-light);color:var(--accent)}
.loading{text-align:center;padding:100px 24px;color:var(--text-muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.detail-grid{grid-template-columns:1fr}.info-grid{grid-template-columns:1fr}.school-name{font-size:22px}.rf-row{flex-direction:column}}
</style>

</head>

</div></nav>
<div class="cat-strip"><div class="cat-inner"><a href="/schools" class="cat-link">Schools</a><a href="/colleges" class="cat-link">Colleges</a><a href="/electronics" class="cat-link">Electronics</a><a href="/cars" class="cat-link">Cars & Bikes</a><a href="/hospitals" class="cat-link">Hospitals</a><a href="/travel" class="cat-link">Travel</a><a href="/accessories" class="cat-link">Accessories</a></div></div>
<div class="mobile-menu" id="mobileMenu"><button class="mobile-close" onclick="toggleMobile()">&#x2715;</button><a href="/">Home</a><a href="/schools">Schools</a><a href="/colleges">Colleges</a><a href="/electronics">Electronics</a><a href="/compare">Compare</a><a href="/blog">Blog</a><a href="/about">About</a><a href="/contact">Contact</a><a href="/connect">Connect</a></div>

<div class="content" id="pageContent"><div class="loading"><div class="spinner"></div><p>Loading school details...</p></div></div>
<footer class="footer-simple">WIB — Independent. Data-driven.</footer>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="/config.js"></script>
<script>
const db=initFirebase();
const BOARD_NAMES=['CBSE','ICSE','IB','IGCSE','Cambridge','State Board','NIOS'];
function getBoard(d){for(const f of['board','type','board_type','curriculum']){if(d[f]){const v=d[f].toUpperCase();for(const b of BOARD_NAMES){if(v.includes(b.toUpperCase()))return b}}}return d.board||'N/A'}
function getSchoolType(d){const types=['Co-ed','Boys','Girls','Day School','Boarding'];for(const f of['gender','school_type']){if(d[f]){for(const t of types){if(d[f].toLowerCase().includes(t.toLowerCase()))return t}}}if(d.type){const v=d.type.toUpperCase();let isB=false;for(const b of BOARD_NAMES){if(v.includes(b.toUpperCase())){isB=true;break}}if(!isB){for(const t of types){if(d.type.toLowerCase().includes(t.toLowerCase()))return t}}}return'Co-ed'}
function getFees(d){if(d.fees&&typeof d.fees==='object')return d.fees.tuition||d.fees.annual||0;if(typeof d.fees==='number')return d.fees;return d.annual_fees||d.tuition_fees||0}

let selectedRating=0,selectedType='parent';

async function loadSchool(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  const autoEnquire=params.get('enquire')==='true';
  if(!id){document.getElementById('pageContent').innerHTML='<div class="loading">School not found. <a href="/schools" style="color:var(--accent)">Browse all schools</a></div>';return}
  try{
    const doc=await db.collection('items').doc(id).get();
    if(!doc.exists){document.getElementById('pageContent').innerHTML='<div class="loading">School not found. <a href="/schools" style="color:var(--accent)">Browse all schools</a></div>';return}
    const s=doc.data();
    document.title=s.name+' — WIB';
    renderDetail(id,s,autoEnquire);
  }catch(err){console.error(err);document.getElementById('pageContent').innerHTML='<div class="loading">Error loading school. Please refresh.</div>'}
}

function renderDetail(id,s,autoEnquire){
  const board=getBoard(s),type=getSchoolType(s),fees=getFees(s),rating=s.google_rating||s.rating||0;
  const lat=s.coordinates?.lat||s.lat||0,lng=s.coordinates?.lng||s.lng||s.coordinates?.lon||0;
  const fac=s.facilities||s;
  const facilities=[{n:'Transport',v:fac.transport||fac.transportation},{n:'Sports',v:fac.sports},{n:'Library',v:fac.library},{n:'Science Lab',v:fac.science_lab||fac.lab},{n:'CCTV',v:fac.cctv},{n:'Security',v:fac.security},{n:'Arts & Music',v:fac.arts||fac.arts_music},{n:'Swimming Pool',v:fac.pool||fac.swimming_pool},{n:'Hostel',v:fac.hostel}];
  const strengths=s.strengths||s.distinct_features||[];
  const programs=s.programs||s.coaching||[];
  const images=s.images||s.gallery||[];
  const chk='<svg viewBox="0 0 16 16"><path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg>';
  const cross='<svg viewBox="0 0 16 16"><path d="M4.22 4.22a.75.75 0 011.06 0L8 6.94l2.72-2.72a.75.75 0 111.06 1.06L9.06 8l2.72 2.72a.75.75 0 11-1.06 1.06L8 9.06l-2.72 2.72a.75.75 0 01-1.06-1.06L6.94 8 4.22 5.28a.75.75 0 010-1.06z"/></svg>';
  const eName=(s.name||'').replace(/'/g,'');

  document.getElementById('pageContent').innerHTML=`
  <div class="breadcrumb"><a href="/schools">Schools</a> / ${s.name}</div>
  <div class="detail-grid"><div class="main-col">
    <div class="hero-card"><h1 class="school-name">${s.name}</h1>
      <div class="school-badges">${board!=='N/A'?`<span class="badge board">${board}</span>`:''}<span class="badge">${s.city||''}</span><span class="badge">${type}</span>${rating>0?`<span class="badge rating">&#9733; ${rating.toFixed(1)}</span>`:''}</div>
      ${s.description?`<p class="school-desc">${s.description}</p>`:''}
    </div>
    <div class="section"><div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> Academic Details</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Board</div><div class="info-value">${board}</div></div>
        <div class="info-item"><div class="info-label">Type</div><div class="info-value">${type}</div></div>
        <div class="info-item"><div class="info-label">City</div><div class="info-value">${s.city||'N/A'}</div></div>
        <div class="info-item"><div class="info-label">Established</div><div class="info-value">${s.established||s.year_established||'N/A'}</div></div>
        <div class="info-item"><div class="info-label">Annual Fees</div><div class="info-value">${fees>0?'₹'+fees.toLocaleString('en-IN'):'N/A'}</div></div>
        <div class="info-item"><div class="info-label">Board Results</div><div class="info-value">${s.board_results||s.results||'N/A'}</div></div>
        <div class="info-item"><div class="info-label">Student:Teacher</div><div class="info-value">${s.student_teacher_ratio||'N/A'}</div></div>
        <div class="info-item"><div class="info-label">Grades</div><div class="info-value">${s.grades||s.classes||'N/A'}</div></div>
      </div>
    </div>
    <div class="section"><div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Facilities</div>
      <div class="fac-grid">${facilities.map(f=>`<div class="fac-item"><div class="fac-icon ${f.v?'yes':'no'}">${f.v?chk:cross}</div>${f.n}</div>`).join('')}</div>
    </div>
    <div class="section"><div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Photo Gallery</div>
      ${images.length>0?`<div class="gallery-grid">${images.map(u=>`<img class="gallery-img" src="${u}" alt="School photo" onerror="this.style.display='none'">`).join('')}</div>`:'<div class="gallery-empty">Photos coming soon. Add photos via the Image Manager.</div>'}
    </div>
    <div class="section"><div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Ratings Overview</div>
      <div class="rating-overview">
        <div class="rating-source"><div class="score">${rating>0?rating.toFixed(1):'--'}</div><div class="label">Google</div>${lat&&lng?`<a class="link" href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank" rel="noopener">View on Google Maps</a>`:''}</div>
        <div class="rating-source"><div class="score" id="parentScore">--</div><div class="label">WIB Parents</div></div>
        <div class="rating-source"><div class="score" id="studentScore">--</div><div class="label">WIB Students</div></div>
      </div>
    </div>
    <!-- Reviews -->
    <div class="section">
      <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Reviews</div>
      <div id="reviewsList"><div class="review-empty">No reviews yet. Be the first to share your experience.</div></div>
      <!-- Easy review form -->
      <div class="review-form">
        <h4>Write a Review</h4>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">No login required. Your review will appear after admin approval.</p>
        <div class="rf-type"><button class="active" onclick="selectType(this,'parent')">Parent</button><button onclick="selectType(this,'student')">Student</button><button onclick="selectType(this,'teacher')">Teacher</button></div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">Your rating</div>
        <div class="star-select" id="starSelect">${[1,2,3,4,5].map(i=>`<button onclick="selectStar(${i})" id="star${i}">&#9733;</button>`).join('')}</div>
        <div class="rf-row"><input type="text" id="revName" placeholder="Your name"><input type="email" id="revEmail" placeholder="Your email"></div>
        <div class="rf-row"><textarea id="revText" placeholder="Share your experience..."></textarea></div>
        <button class="btn-primary" style="width:100%" onclick="submitReview('${id}','${eName}')">Submit Review</button>
        <div id="reviewMsg" style="display:none"></div>
      </div>
    </div>
    ${strengths.length>0?`<div class="section"><div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> What Makes This School Stand Out</div><div class="strength-list">${strengths.map(st=>`<div class="strength-item"><div class="strength-dot"></div><span>${st}</span></div>`).join('')}</div></div>`:''}
    ${programs.length>0?`<div class="section"><div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Programs & Coaching</div><div class="program-tags">${programs.map(p=>`<span class="program-tag">${p}</span>`).join('')}</div></div>`:''}
    ${lat&&lng?`<div class="section"><div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Location</div><iframe class="map-frame" loading="lazy" src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed"></iframe></div>`:''}
  </div>
  <div class="sidebar">
    <div class="sidebar-card" id="enquiryCard"><div class="sidebar-title">Send an Enquiry</div>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">Interested in this school? Send your details and we will connect you.</p>
      <form class="enquiry-form" onsubmit="submitEnquiry(event,'${id}','${eName}')">
        <input type="text" name="parentName" placeholder="Your name" required>
        <input type="email" name="parentEmail" placeholder="Your email" required>
        <input type="tel" name="parentPhone" placeholder="Your phone number" required>
        <select name="childGrade" required><option value="">Child's grade</option><option>Pre-KG / Nursery</option><option>LKG</option><option>UKG</option><option>Grade 1-3</option><option>Grade 4-5</option><option>Grade 6-8</option><option>Grade 9-10</option><option>Grade 11-12</option></select>
        <textarea name="message" placeholder="Your message (optional)"></textarea>
        <button type="submit" class="btn-primary" style="width:100%" id="enquiryBtn">Send Enquiry</button>
      </form>
      <div id="enquiryMsg" style="display:none"></div>
    </div>
    ${s.website?`<div class="sidebar-card"><div class="sidebar-title">Official Website</div><a href="${s.website.startsWith('http')?s.website:'https://'+s.website}" target="_blank" rel="noopener" style="color:var(--accent);font-size:14px;font-weight:500">Visit School Website</a></div>`:''}
    <div class="sidebar-card"><div class="sidebar-title">Quick Actions</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <a href="/compare" style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-secondary);border-radius:8px;font-size:13px;font-weight:500">Compare with other schools</a>
        <a href="/schools" style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-secondary);border-radius:8px;font-size:13px;font-weight:500">Back to all schools</a>
      </div>
    </div>
  </div></div>`;
  if(autoEnquire){setTimeout(()=>{document.getElementById('enquiryCard').scrollIntoView({behavior:'smooth',block:'center'});document.querySelector('.enquiry-form input[name="parentName"]').focus()},500)}
  loadReviews(id);
}

function selectStar(n){selectedRating=n;for(let i=1;i<=5;i++){document.getElementById('star'+i).classList.toggle('active',i<=n)}}
function selectType(btn,t){selectedType=t;document.querySelectorAll('.rf-type button').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}

async function submitReview(schoolId,schoolName){
  const name=document.getElementById('revName').value.trim();
  const email=document.getElementById('revEmail').value.trim();
  const text=document.getElementById('revText').value.trim();
  const msg=document.getElementById('reviewMsg');
  if(!name||!email||!selectedRating){msg.className='form-msg error';msg.textContent='Please enter your name, email, and rating.';msg.style.display='block';return}
  try{
    await db.collection('reviews').add({schoolId,schoolName,name,email,text,rating:selectedRating,type:selectedType,status:'pending',category:'school',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    msg.className='form-msg success';msg.textContent='Review submitted. It will appear after admin approval.';msg.style.display='block';
    document.getElementById('revName').value='';document.getElementById('revEmail').value='';document.getElementById('revText').value='';selectedRating=0;document.querySelectorAll('.star-select button').forEach(b=>b.classList.remove('active'));
  }catch(e){msg.className='form-msg error';msg.textContent='Failed to submit. Please try again.';msg.style.display='block'}
}

async function submitEnquiry(e,schoolId,schoolName){
  e.preventDefault();const btn=document.getElementById('enquiryBtn');const msg=document.getElementById('enquiryMsg');
  btn.disabled=true;btn.textContent='Sending...';
  const f=e.target;
  try{
    await db.collection('contact_requests').add({schoolId,schoolName,parentName:f.parentName.value,parentEmail:f.parentEmail.value,parentPhone:f.parentPhone.value,childGrade:f.childGrade.value,message:f.message.value,status:'pending',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    msg.className='form-msg success';msg.textContent='Enquiry sent successfully.';msg.style.display='block';f.reset();
  }catch(err){msg.className='form-msg error';msg.textContent='Failed to send. Please try again.';msg.style.display='block'}
  btn.disabled=false;btn.textContent='Send Enquiry';
}

async function loadReviews(schoolId){
  try{
    const snap=await db.collection('reviews').where('schoolId','==',schoolId).where('status','==','approved').get();
    let html='',pC=0,sC=0,pT=0,sT=0;
    snap.forEach(doc=>{const r=doc.data();
      html+=`<div class="review-item"><div class="review-header"><span class="review-name">${r.name||'Anonymous'} <span style="font-size:11px;color:var(--text-muted);font-weight:400">(${r.type||'parent'})</span></span><span class="review-stars">${'★'.repeat(r.rating||0)}${'☆'.repeat(5-(r.rating||0))}</span></div><div class="review-text">${r.text||''}</div></div>`;
      if(r.type==='student'){sC++;sT+=(r.rating||0)}else{pC++;pT+=(r.rating||0)}
    });
    if(html)document.getElementById('reviewsList').innerHTML=html;
    if(pC>0)document.getElementById('parentScore').textContent=(pT/pC).toFixed(1);
    if(sC>0)document.getElementById('studentScore').textContent=(sT/sC).toFixed(1);
  }catch(e){console.error('Reviews error:',e)}
}
loadSchool();
</script>
