<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Details — WIBest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0F172A; --navy-light: #1E293B; --slate-700: #334155; --slate-600: #475569;
            --slate-500: #64748B; --slate-400: #94A3B8; --slate-300: #CBD5E1; --slate-200: #E2E8F0; --slate-100: #F1F5F9; --slate-50: #F8FAFC;
            --blue: #3B82F6; --blue-dark: #2563EB; --blue-50: #EFF6FF;
            --green: #16A34A; --green-50: #F0FDF4; --green-100: #DCFCE7;
            --amber: #D97706; --amber-50: #FFFBEB;
            --red: #DC2626;
            --white: #FFFFFF;
            --radius: 10px; --radius-lg: 14px;
            --shadow: 0 2px 8px rgba(0,0,0,0.06); --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; color: var(--navy); background: var(--slate-50); line-height: 1.6; -webkit-font-smoothing: antialiased; }

        .nav-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 48px; background: var(--white); border-bottom: 1px solid var(--slate-200); position: sticky; top: 0; z-index: 100; }
        .logo { text-decoration: none; display: flex; align-items: center; } .logo-img { height: 68px; width: auto; }
        .nav-links { display: flex; gap: 28px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--slate-600); font-weight: 500; font-size: 14px; } .nav-links a:hover { color: var(--navy); }
        .btn-nav { background: var(--navy); color: var(--white); padding: 9px 20px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 13px; }
        .nav-categories { display: flex; gap: 0; padding: 0 48px; background: var(--slate-50); border-bottom: 1px solid var(--slate-200); overflow-x: auto; scrollbar-width: none; }
        .nav-categories::-webkit-scrollbar { display: none; }
        .nav-cat { text-decoration: none; color: var(--slate-500); font-weight: 500; font-size: 13px; padding: 10px 16px; white-space: nowrap; border-bottom: 2px solid transparent; }
        .nav-cat:hover { color: var(--navy); } .nav-cat.active { color: var(--blue); border-bottom-color: var(--blue); }
        .nav-cat-soon { font-size: 10px; font-weight: 700; color: var(--slate-400); background: var(--slate-200); padding: 1px 6px; border-radius: 4px; margin-left: 6px; }

        .breadcrumb { padding: 12px 48px; font-size: 12px; color: var(--slate-400); background: var(--white); border-bottom: 1px solid var(--slate-100); }
        .breadcrumb a { color: var(--blue); text-decoration: none; font-weight: 500; } .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { margin: 0 6px; }

        .school-hero { background: var(--navy); padding: 44px 48px; color: var(--white); }
        .hero-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-start; }
        .hero-info { flex: 1; }
        .school-hero h1 { font-size: 30px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.02em; }
        .hero-city { font-size: 14px; color: var(--slate-400); margin-bottom: 18px; display: flex; align-items: center; gap: 6px; }
        .hero-city svg { width: 14px; height: 14px; stroke: var(--slate-400); fill: none; stroke-width: 2; }
        .hero-badges { display: flex; gap: 8px; flex-wrap: wrap; }
        .hero-badge { padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.08); color: var(--slate-300); letter-spacing: 0.03em; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .hero-score { text-align: center; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 18px 26px; }
        .hero-score-num { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; }
        .hero-score-label { font-size: 11px; color: var(--slate-400); margin-top: 3px; font-weight: 500; }

        .content { max-width: 1200px; margin: 0 auto; padding: 28px 48px 64px; display: grid; grid-template-columns: 1fr 360px; gap: 24px; }
        .main { display: flex; flex-direction: column; gap: 20px; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }

        .card { background: var(--white); border: 1px solid var(--slate-200); border-radius: var(--radius-lg); overflow: hidden; }
        .card-head { padding: 18px 22px 0; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .card-head svg { width: 18px; height: 18px; stroke: var(--slate-500); fill: none; stroke-width: 1.8; }
        .card-head h2 { font-size: 16px; font-weight: 700; color: var(--navy); letter-spacing: -0.01em; }
        .card-body { padding: 0 22px 22px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-item { padding: 10px 12px; background: var(--slate-50); border-radius: 8px; }
        .info-label { font-size: 10px; font-weight: 600; color: var(--slate-400); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
        .info-value { font-size: 14px; font-weight: 600; color: var(--navy); }

        .fac-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .fac-item { display: flex; align-items: center; gap: 7px; padding: 9px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .fac-yes { background: var(--green-50); color: var(--green); } .fac-no { background: var(--slate-50); color: var(--slate-400); }
        .fac-item svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }

        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .gallery-item { aspect-ratio: 4/3; border-radius: 8px; overflow: hidden; background: var(--slate-100); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; aspect-ratio: 16/7; background: var(--slate-50); border-radius: 8px; border: 1.5px dashed var(--slate-200); color: var(--slate-400); font-size: 13px; font-weight: 500; }
        .gallery-empty svg { width: 28px; height: 28px; stroke: var(--slate-300); fill: none; stroke-width: 1.5; margin-bottom: 8px; }

        .map-box { border-radius: 8px; overflow: hidden; height: 220px; background: var(--slate-100); }
        .map-box iframe { width: 100%; height: 100%; border: 0; }

        .review-summary { display: flex; align-items: center; gap: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--slate-100); margin-bottom: 18px; }
        .review-big { font-size: 42px; font-weight: 800; color: var(--navy); line-height: 1; letter-spacing: -0.02em; }
        .review-stars { color: var(--amber); font-size: 16px; letter-spacing: 1px; }
        .review-count { font-size: 12px; color: var(--slate-400); margin-top: 3px; font-weight: 500; }
        .no-reviews { text-align: center; padding: 20px; color: var(--slate-400); font-size: 13px; }
        .no-reviews svg { width: 28px; height: 28px; stroke: var(--slate-300); fill: none; stroke-width: 1.5; margin-bottom: 6px; display: block; margin: 0 auto 6px; }

        .review-form { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--slate-100); }
        .review-form h3 { font-size: 14px; font-weight: 700; color: var(--navy); }
        .star-rating { display: flex; gap: 4px; }
        .star-btn { font-size: 24px; cursor: pointer; background: none; border: none; color: var(--slate-300); transition: color 0.15s; padding: 0; }
        .star-btn.active, .star-btn:hover { color: var(--amber); }
        .form-input { padding: 9px 12px; border: 1.5px solid var(--slate-200); border-radius: 8px; font-family: inherit; font-size: 13px; color: var(--navy); }
        .form-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        textarea.form-input { resize: vertical; min-height: 70px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-submit { padding: 10px 20px; background: var(--navy); color: var(--white); border: none; border-radius: 8px; font-family: inherit; font-weight: 600; font-size: 13px; cursor: pointer; }
        .btn-submit:hover { background: var(--slate-700); }
        .msg-success { display: none; text-align: center; padding: 14px; background: var(--green-100); border-radius: 8px; color: var(--green); font-weight: 600; font-size: 13px; }

        .scard { background: var(--white); border: 1px solid var(--slate-200); border-radius: var(--radius-lg); padding: 20px; }
        .scard h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--navy); display: flex; align-items: center; gap: 8px; letter-spacing: -0.01em; }
        .scard h3 svg { width: 16px; height: 16px; stroke: var(--slate-500); fill: none; stroke-width: 1.8; }
        .fee-row { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--slate-100); font-size: 13px; }
        .fee-row:last-child { border-bottom: none; }
        .fee-label { color: var(--slate-500); } .fee-value { font-weight: 700; color: var(--navy); }

        .contact-gated { text-align: center; padding: 4px 0; }
        .contact-gated p { font-size: 12px; color: var(--slate-400); margin-bottom: 12px; line-height: 1.5; }
        .btn-request { width: 100%; padding: 10px; background: var(--blue); color: var(--white); border: none; border-radius: 8px; font-family: inherit; font-weight: 600; font-size: 13px; cursor: pointer; }
        .btn-request:hover { background: var(--blue-dark); }
        .request-form { display: none; flex-direction: column; gap: 8px; margin-top: 12px; }

        .btn-back { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--white); border: 1px solid var(--slate-200); color: var(--navy); border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 13px; }
        .btn-back:hover { border-color: var(--slate-300); }
        .btn-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

        .loading-container { text-align: center; padding: 100px 20px; grid-column: 1 / -1; }
        .spinner { width: 32px; height: 32px; border: 2.5px solid var(--slate-200); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer { background: var(--navy); color: var(--slate-500); text-align: center; padding: 28px; font-size: 13px; }

        @media (max-width: 768px) {
            .nav-top { padding: 10px 20px; } .nav-links { display: none; }
            .nav-categories { padding: 0 20px; } .breadcrumb { padding: 10px 20px; }
            .school-hero { padding: 28px 20px; } .school-hero h1 { font-size: 24px; }
            .hero-inner { flex-direction: column; gap: 18px; }
            .content { grid-template-columns: 1fr; padding: 20px; }
            .info-grid { grid-template-columns: 1fr; } .fac-grid { grid-template-columns: 1fr 1fr; }
            .gallery-grid { grid-template-columns: 1fr 1fr; } .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="nav-top">
        <a href="index.html" class="logo"><img src="logo.png" alt="WIBest" class="logo-img"></a>
        <div class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="connect.html">Connect</a></div>
        <a href="schools.html" class="btn-nav">Explore</a>
    </nav>
    <div class="nav-categories">
        <a href="schools.html" class="nav-cat active">Schools</a><a href="colleges.html" class="nav-cat">Colleges</a>
        <a href="#" class="nav-cat">Electronics<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Cars & Bikes<span class="nav-cat-soon">SOON</span></a>
        <a href="#" class="nav-cat">Places<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Travel<span class="nav-cat-soon">SOON</span></a>
        <a href="#" class="nav-cat">Restaurants<span class="nav-cat-soon">SOON</span></a>
    </div>

    <div id="pageContent"><div class="loading-container"><div class="spinner"></div><p style="color:var(--slate-400);font-size:14px;">Loading school details...</p></div></div>

    <footer class="footer">WIBest &mdash; Independent. Data-driven.</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const fc = { apiKey: "AIzaSyA_IcdzywseRgXTY8MqiOY1LLfwnfps3Oo", authDomain: "wibest-449fe.firebaseapp.com", projectId: "wibest-449fe", storageBucket: "wibest-449fe.firebasestorage.app", messagingSenderId: "438027122345", appId: "1:438027122345:web:70b5427de9bf0a74f51bb8" };
        const db = getFirestore(initializeApp(fc));

        function fmt(a){if(!a||a==='N/A')return'Contact School';const n=parseInt(a);return isNaN(n)?a:'\u20B9'+n.toLocaleString('en-IN');}
        function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
        function stars(r){let s='';for(let i=1;i<=5;i++)s+=i<=r?'\u2605':'\u2606';return s;}
        function fac(name,has){return `<div class="fac-item ${has?'fac-yes':'fac-no'}"><svg viewBox="0 0 24 24"><path d="${has?'M20 6L9 17l-5-5':'M18 6L6 18M6 6l12 12'}"/></svg>${name}</div>`;}

        let currentId = '';

        function renderSchool(s) {
            currentId = s.id;
            const board=s.board||'N/A',type=s.school_type||s.type||'Day School',gender=s.gender_type||s.gender||'Co-ed';
            const city=s.city||'',state=s.state||'',est=s.established_year||s.established||s.establishedYear||'';
            const grades=s.grades_offered||s.grades||s.gradesOffered||'';
            const ratio=s.student_teacher_ratio||s.studentTeacherRatio||'';
            const students=s.total_students||s.totalStudents||'';
            const teachers=s.total_teachers||s.totalTeachers||'';
            const passP=s.pass_percentage||s.boardResults||'';
            const desc=s.long_description||s.description||s.shortDescription||'';
            const website=s.website||'',fee=s.fee_tuition||s.fees||s.price||'';
            const feeT=s.fee_transport||s.transportFee||'',feeH=s.fee_hostel||'';
            const rating=s.user_rating||0,reviews=s.total_reviews||0;
            const lat=s.coordinates?.lat||0,lng=s.coordinates?.lng||0;
            const images=s.gallery_images||s.images||[];

            document.title=`${s.name} — WIBest`;

            document.getElementById('pageContent').innerHTML = `
                <div class="breadcrumb"><a href="index.html">Home</a><span>/</span><a href="schools.html">Schools</a><span>/</span>${s.name}</div>
                <div class="school-hero"><div class="hero-inner">
                    <div class="hero-info">
                        <h1>${s.name}</h1>
                        <div class="hero-city"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${cap(city)}${state?', '+state:''}, India</div>
                        <div class="hero-badges">
                            ${board!=='N/A'?`<span class="hero-badge">${board}</span>`:''}
                            <span class="hero-badge">${type}</span><span class="hero-badge">${gender}</span>
                            ${est?`<span class="hero-badge">Est. ${est}</span>`:''}
                        </div>
                    </div>
                    <div class="hero-score">
                        <div class="hero-score-num">${rating>0?rating.toFixed(1):'—'}</div>
                        <div class="hero-score-label">${rating>0?reviews+' reviews':'No reviews yet'}</div>
                    </div>
                </div></div>

                <div class="content"><div class="main">
                    ${desc?`<div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h2>About</h2></div><div class="card-body"><p style="font-size:14px;color:var(--slate-600);line-height:1.7;">${desc}</p></div></div>`:''}

                    <div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><h2>Academic details</h2></div>
                    <div class="card-body"><div class="info-grid">
                        <div class="info-item"><div class="info-label">Board</div><div class="info-value">${board}</div></div>
                        <div class="info-item"><div class="info-label">School type</div><div class="info-value">${type}</div></div>
                        ${grades?`<div class="info-item"><div class="info-label">Grades</div><div class="info-value">${Array.isArray(grades)?grades.join(', '):grades}</div></div>`:''}
                        ${ratio?`<div class="info-item"><div class="info-label">Student-teacher ratio</div><div class="info-value">${ratio}</div></div>`:''}
                        ${students?`<div class="info-item"><div class="info-label">Total students</div><div class="info-value">${students}</div></div>`:''}
                        ${teachers?`<div class="info-item"><div class="info-label">Total teachers</div><div class="info-value">${teachers}</div></div>`:''}
                        ${passP?`<div class="info-item"><div class="info-label">Board results</div><div class="info-value">${passP}</div></div>`:''}
                        <div class="info-item"><div class="info-label">Gender</div><div class="info-value">${gender}</div></div>
                    </div></div></div>

                    <div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><h2>Facilities</h2></div>
                    <div class="card-body"><div class="fac-grid">
                        ${fac('Transport',s.has_transport)} ${fac('Hostel',s.has_hostel)} ${fac('Science Lab',s.has_lab)}
                        ${fac('Sports',s.has_sports)} ${fac('Swimming Pool',s.has_swimming_pool)} ${fac('CCTV',s.has_cctv)}
                        ${fac('Security',s.has_security)} ${fac('Library',s.has_library)} ${fac('Arts / Music',s.has_arts)}
                    </div></div></div>

                    <div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><h2>Photo gallery</h2></div>
                    <div class="card-body">
                        ${images.length>0?`<div class="gallery-grid">${images.map(img=>`<div class="gallery-item"><img src="${img}" alt="School photo" loading="lazy"></div>`).join('')}</div>`:
                        `<div class="gallery-empty"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Photos coming soon</div>`}
                    </div></div>

                    ${lat&&lng?`<div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><h2>Location</h2></div>
                    <div class="card-body"><div class="map-box"><iframe src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed" allowfullscreen loading="lazy"></iframe></div></div></div>`:''}

                    <div class="card"><div class="card-head"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><h2>Parent reviews</h2></div>
                    <div class="card-body">
                        <div class="review-summary">
                            <div class="review-big">${rating>0?rating.toFixed(1):'—'}</div>
                            <div><div class="review-stars">${stars(Math.round(rating))}</div><div class="review-count">${reviews>0?reviews+' reviews':'No reviews yet'}</div></div>
                        </div>
                        <div id="reviewsList"></div>
                        <div class="review-form" id="reviewForm">
                            <h3>Write a review</h3>
                            <div class="star-rating" id="starRating">
                                <button class="star-btn" data-val="1">\u2605</button><button class="star-btn" data-val="2">\u2605</button><button class="star-btn" data-val="3">\u2605</button><button class="star-btn" data-val="4">\u2605</button><button class="star-btn" data-val="5">\u2605</button>
                            </div>
                            <div class="form-row"><input type="text" class="form-input" id="reviewName" placeholder="Your name"><input type="email" class="form-input" id="reviewEmail" placeholder="Your email"></div>
                            <textarea class="form-input" id="reviewText" placeholder="Share your experience with this school..."></textarea>
                            <button class="btn-submit" id="submitReview">Submit review</button>
                            <div class="msg-success" id="reviewSuccess">Thank you. Your review has been submitted for approval.</div>
                        </div>
                    </div></div>

                    <a href="schools.html" class="btn-back"><svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>Back to all schools</a>
                </div>

                <div class="sidebar">
                    <div class="scard"><h3><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Fee structure</h3>
                        <div class="fee-row"><span class="fee-label">Tuition (Annual)</span><span class="fee-value">${fee?fmt(fee):'Contact School'}</span></div>
                        ${feeT?`<div class="fee-row"><span class="fee-label">Transport</span><span class="fee-value">${fmt(feeT)}</span></div>`:''}
                        ${feeH?`<div class="fee-row"><span class="fee-label">Hostel</span><span class="fee-value">${fmt(feeH)}</span></div>`:''}
                    </div>

                    <div class="scard"><h3><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Contact information</h3>
                        <div class="contact-gated" id="contactGated">
                            <p>Contact details are available on request to protect school privacy.</p>
                            <button class="btn-request" id="requestBtn">Request contact details</button>
                            <div class="request-form" id="requestForm">
                                <input type="text" class="form-input" id="reqName" placeholder="Your name" style="width:100%">
                                <input type="email" class="form-input" id="reqEmail" placeholder="Your email" style="width:100%">
                                <input type="text" class="form-input" id="reqPhone" placeholder="Phone (optional)" style="width:100%">
                                <select class="form-input" id="reqReason" style="width:100%">
                                    <option value="">Reason for request</option><option value="admission">Looking for admission</option>
                                    <option value="visit">Want to visit</option><option value="inquiry">General inquiry</option><option value="other">Other</option>
                                </select>
                                <button class="btn-submit" id="submitRequest">Submit request</button>
                            </div>
                            <div class="msg-success" id="requestSuccess">Request sent. You will receive details via email once approved.</div>
                        </div>
                    </div>

                    ${website?`<div class="scard"><h3><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Website</h3>
                        <a href="${website}" target="_blank" style="color:var(--blue);text-decoration:none;font-size:13px;font-weight:500;word-break:break-all;">${website.replace('https://','').replace('http://','')}</a>
                    </div>`:''}
                </div></div>
            `;

            // Star rating
            let selectedRating = 0;
            document.querySelectorAll('.star-btn').forEach(btn => {
                btn.addEventListener('click', () => { selectedRating = parseInt(btn.dataset.val); document.querySelectorAll('.star-btn').forEach((b,i) => b.classList.toggle('active', i < selectedRating)); });
                btn.addEventListener('mouseenter', () => { const v=parseInt(btn.dataset.val); document.querySelectorAll('.star-btn').forEach((b,i) => b.style.color = i<v?'#D97706':'#CBD5E1'); });
            });
            document.getElementById('starRating')?.addEventListener('mouseleave', () => { document.querySelectorAll('.star-btn').forEach((b,i) => b.style.color = i<selectedRating?'#D97706':'#CBD5E1'); });

            // Submit review
            document.getElementById('submitReview')?.addEventListener('click', async()=>{
                const name=document.getElementById('reviewName').value.trim(),email=document.getElementById('reviewEmail').value.trim(),text=document.getElementById('reviewText').value.trim();
                if(!name||!email||!text||!selectedRating){alert('Please fill in all fields and select a rating.');return;}
                try{await addDoc(collection(db,"reviews"),{item_id:currentId,category:'schools',user_name:name,user_email:email,rating:selectedRating,review_text:text,is_approved:false,created_at:serverTimestamp()});
                document.getElementById('reviewForm').style.display='none';document.getElementById('reviewSuccess').style.display='block';}catch(e){alert('Error: '+e.message);}
            });

            // Request contact
            document.getElementById('requestBtn')?.addEventListener('click',()=>{document.getElementById('requestForm').style.display='flex';document.getElementById('requestBtn').style.display='none';});
            document.getElementById('submitRequest')?.addEventListener('click',async()=>{
                const name=document.getElementById('reqName').value.trim(),email=document.getElementById('reqEmail').value.trim(),reason=document.getElementById('reqReason').value;
                if(!name||!email||!reason){alert('Please fill in name, email, and reason.');return;}
                try{await addDoc(collection(db,"contact_requests"),{item_id:currentId,school_name:s.name,requester_name:name,requester_email:email,requester_phone:document.getElementById('reqPhone').value.trim(),reason:reason,status:'pending',created_at:serverTimestamp()});
                document.getElementById('requestForm').style.display='none';document.getElementById('requestSuccess').style.display='block';}catch(e){alert('Error: '+e.message);}
            });

            loadReviews();
        }

        async function loadReviews(){
            try{const q=query(collection(db,"reviews"),where("item_id","==",currentId),where("is_approved","==",true));const snap=await getDocs(q);const list=document.getElementById('reviewsList');if(!list)return;
            if(snap.empty){list.innerHTML='<div class="no-reviews"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>No reviews yet. Be the first to share your experience.</div>';return;}
            let h='';snap.forEach(d=>{const r=d.data();h+=`<div style="padding:12px 0;border-bottom:1px solid var(--slate-100);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><strong style="font-size:13px;">${r.user_name}</strong><span style="color:var(--amber);font-size:13px;">${stars(r.rating)}</span></div><p style="font-size:13px;color:var(--slate-600);line-height:1.6;">${r.review_text}</p></div>`;});
            list.innerHTML=h;}catch(e){console.error(e);}
        }

        (async()=>{
            const id=new URLSearchParams(window.location.search).get('id');
            if(!id){document.getElementById('pageContent').innerHTML='<div class="loading-container"><p style="font-size:14px;color:var(--slate-400);">No school selected. <a href="schools.html" style="color:var(--blue);">Browse schools</a></p></div>';return;}
            try{const snap=await getDoc(doc(db,"items",id));if(snap.exists())renderSchool({id:snap.id,...snap.data()});
            else document.getElementById('pageContent').innerHTML='<div class="loading-container"><p style="font-size:14px;color:var(--slate-400);">School not found. <a href="schools.html" style="color:var(--blue);">Browse schools</a></p></div>';}
            catch(e){document.getElementById('pageContent').innerHTML=`<div class="loading-container"><p style="color:var(--slate-400);">${e.message}</p></div>`;}
        })();
    </script>
</body>
</html>
