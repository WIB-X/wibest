<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Details — WIB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--navy:#0F172A;--navy-light:#1E293B;--slate-700:#334155;--slate-600:#475569;--slate-500:#64748B;--slate-400:#94A3B8;--slate-300:#CBD5E1;--slate-200:#E2E8F0;--slate-100:#F1F5F9;--slate-50:#F8FAFC;--blue:#3B82F6;--blue-dark:#2563EB;--blue-50:#EFF6FF;--green:#16A34A;--green-50:#F0FDF4;--green-100:#DCFCE7;--amber:#D97706;--amber-50:#FFFBEB;--white:#FFF;--radius:10px;--radius-lg:14px;--shadow-md:0 4px 16px rgba(0,0,0,0.08);}
        *{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Inter',-apple-system,sans-serif;color:var(--navy);background:var(--slate-50);line-height:1.6;-webkit-font-smoothing:antialiased;}
        .nav-top{display:flex;align-items:center;justify-content:space-between;padding:12px 48px;background:var(--white);border-bottom:1px solid var(--slate-200);position:sticky;top:0;z-index:100;}.logo{text-decoration:none;display:flex;align-items:center;}.logo-img{height:68px;width:auto;}.nav-links{display:flex;gap:28px;align-items:center;}.nav-links a{text-decoration:none;color:var(--slate-600);font-weight:500;font-size:14px;}.nav-links a:hover{color:var(--navy);}.btn-nav{background:var(--navy);color:var(--white);padding:9px 20px;border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;}
        .nav-categories{display:flex;gap:0;padding:0 48px;background:var(--slate-50);border-bottom:1px solid var(--slate-200);overflow-x:auto;scrollbar-width:none;}.nav-categories::-webkit-scrollbar{display:none;}.nav-cat{text-decoration:none;color:var(--slate-500);font-weight:500;font-size:13px;padding:10px 16px;white-space:nowrap;border-bottom:2px solid transparent;}.nav-cat:hover{color:var(--navy);}.nav-cat.active{color:var(--blue);border-bottom-color:var(--blue);}.nav-cat-soon{font-size:10px;font-weight:700;color:var(--slate-400);background:var(--slate-200);padding:1px 6px;border-radius:4px;margin-left:6px;}
        .bc{padding:12px 48px;font-size:12px;color:var(--slate-400);background:var(--white);border-bottom:1px solid var(--slate-100);}.bc a{color:var(--blue);text-decoration:none;font-weight:500;}.bc span{margin:0 6px;}
        .hero{background:var(--navy);padding:44px 48px;color:var(--white);}.hero-in{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;}.hero-info{flex:1;}.hero h1{font-size:30px;font-weight:800;margin-bottom:6px;letter-spacing:-0.02em;}.hero-city{font-size:14px;color:var(--slate-400);margin-bottom:18px;}.hero-badges{display:flex;gap:8px;flex-wrap:wrap;}.hero-badge{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.08);color:var(--slate-300);text-transform:uppercase;letter-spacing:0.03em;border:1px solid rgba(255,255,255,0.1);}
        .hero-score{text-align:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px 26px;}.hero-score-num{font-size:32px;font-weight:800;}.hero-score-label{font-size:11px;color:var(--slate-400);margin-top:3px;}
        .ct{max-width:1200px;margin:0 auto;padding:28px 48px 64px;display:grid;grid-template-columns:1fr 360px;gap:24px;}.main{display:flex;flex-direction:column;gap:20px;}.side{display:flex;flex-direction:column;gap:20px;}
        .card{background:var(--white);border:1px solid var(--slate-200);border-radius:var(--radius-lg);overflow:hidden;}.ch{padding:18px 22px 0;display:flex;align-items:center;gap:10px;margin-bottom:16px;}.ch svg{width:18px;height:18px;stroke:var(--slate-500);fill:none;stroke-width:1.8;}.ch h2{font-size:16px;font-weight:700;color:var(--navy);}.cb{padding:0 22px 22px;}
        .ig{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.ii{padding:10px 12px;background:var(--slate-50);border-radius:8px;}.il{font-size:10px;font-weight:600;color:var(--slate-400);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px;}.iv{font-size:14px;font-weight:600;color:var(--navy);}
        .fg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}.fi{display:flex;align-items:center;gap:7px;padding:9px 12px;border-radius:8px;font-size:12px;font-weight:600;}.fy{background:var(--green-50);color:var(--green);}.fn{background:var(--slate-50);color:var(--slate-400);}.fi svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}
        .gg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}.gi{aspect-ratio:4/3;border-radius:8px;overflow:hidden;background:var(--slate-100);}.gi img{width:100%;height:100%;object-fit:cover;}
        .map-box{border-radius:8px;overflow:hidden;height:220px;background:var(--slate-100);}.map-box iframe{width:100%;height:100%;border:0;}
        .ratings-overview{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}.ro-card{border:1px solid var(--slate-200);border-radius:10px;padding:16px;text-align:center;}.ro-source{font-size:11px;font-weight:600;color:var(--slate-400);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}.ro-score{font-size:28px;font-weight:800;color:var(--navy);}.ro-stars{color:var(--amber);font-size:13px;letter-spacing:1px;margin:2px 0;}.ro-count{font-size:11px;color:var(--slate-400);}.ro-link{display:inline-block;margin-top:8px;font-size:11px;font-weight:600;color:var(--blue);text-decoration:none;}.ro-link:hover{text-decoration:underline;}
        .no-rev{text-align:center;padding:20px;color:var(--slate-400);font-size:13px;}.no-rev svg{width:24px;height:24px;stroke:var(--slate-300);fill:none;stroke-width:1.5;display:block;margin:0 auto 6px;}
        .rf{display:flex;flex-direction:column;gap:10px;margin-top:16px;padding-top:16px;border-top:1px solid var(--slate-100);}.rf h3{font-size:14px;font-weight:700;color:var(--navy);}
        .sr{display:flex;gap:4px;}.sb{font-size:24px;cursor:pointer;background:none;border:none;color:var(--slate-300);transition:color 0.15s;padding:0;}.sb.active,.sb:hover{color:var(--amber);}
        .fi2{padding:9px 12px;border:1.5px solid var(--slate-200);border-radius:8px;font-family:inherit;font-size:13px;color:var(--navy);width:100%;}.fi2:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
        textarea.fi2{resize:vertical;min-height:70px;}.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
        .btn-s{padding:10px 20px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;}.btn-s:hover{background:var(--slate-700);}
        .ms{display:none;text-align:center;padding:14px;background:var(--green-100);border-radius:8px;color:var(--green);font-weight:600;font-size:13px;}
        .strength-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}.strength-item{padding:14px;background:var(--slate-50);border-radius:10px;border-left:3px solid var(--blue);}.strength-item h4{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:3px;}.strength-item p{font-size:12px;color:var(--slate-500);line-height:1.5;}
        .prog-grid{display:flex;flex-wrap:wrap;gap:8px;}.prog-tag{padding:6px 14px;background:var(--blue-50);border:1px solid var(--blue);border-radius:8px;font-size:12px;font-weight:600;color:var(--blue-dark);}.prog-empty{font-size:13px;color:var(--slate-400);padding:12px 0;}
        .sc{background:var(--white);border:1px solid var(--slate-200);border-radius:var(--radius-lg);padding:20px;}.sc h3{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--navy);display:flex;align-items:center;gap:8px;}.sc h3 svg{width:16px;height:16px;stroke:var(--slate-500);fill:none;stroke-width:1.8;}
        .fee-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--slate-100);font-size:13px;}.fee-row:last-child{border-bottom:none;}.fl{color:var(--slate-500);}.fv{font-weight:700;color:var(--navy);}
        .cg{text-align:center;padding:4px 0;}.cg p{font-size:12px;color:var(--slate-400);margin-bottom:12px;line-height:1.5;}.btn-r{width:100%;padding:10px;background:var(--blue);color:var(--white);border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;}.btn-r:hover{background:var(--blue-dark);}
        .rqf{display:none;flex-direction:column;gap:8px;margin-top:12px;}
        .btn-back{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:var(--white);border:1px solid var(--slate-200);color:var(--navy);border-radius:8px;text-decoration:none;font-weight:600;font-size:13px;}.btn-back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
        .lc{text-align:center;padding:100px 20px;grid-column:1/-1;}.spinner{width:32px;height:32px;border:2.5px solid var(--slate-200);border-top-color:var(--blue);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 14px;}@keyframes spin{to{transform:rotate(360deg);}}
        .footer{background:var(--navy);color:var(--slate-500);text-align:center;padding:28px;font-size:13px;}
        @media(max-width:768px){.nav-top{padding:10px 20px;}.nav-links{display:none;}.nav-categories{padding:0 20px;}.bc{padding:10px 20px;}.hero{padding:28px 20px;}.hero h1{font-size:24px;}.hero-in{flex-direction:column;gap:18px;}.ct{grid-template-columns:1fr;padding:20px;}.ig{grid-template-columns:1fr;}.fg{grid-template-columns:1fr 1fr;}.gg{grid-template-columns:1fr 1fr;}.fr{grid-template-columns:1fr;}.ratings-overview{grid-template-columns:1fr;}.strength-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
    <nav class="nav-top"><a href="index.html" class="logo"><img src="logo.png" alt="WIB" class="logo-img"></a><div class="nav-links"><a href="index.html">Home</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="connect.html">Connect</a></div><a href="schools.html" class="btn-nav">Explore</a></nav>
    <div class="nav-categories"><a href="schools.html" class="nav-cat active">Schools</a><a href="colleges.html" class="nav-cat">Colleges</a><a href="#" class="nav-cat">Electronics<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Cars & Bikes<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Places<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Travel<span class="nav-cat-soon">SOON</span></a><a href="#" class="nav-cat">Restaurants<span class="nav-cat-soon">SOON</span></a></div>
    <div id="pageContent"><div class="lc"><div class="spinner"></div><p style="color:var(--slate-400);font-size:14px;">Loading school details...</p></div></div>
    <footer class="footer">WIB &mdash; Independent. Data-driven.</footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, addDoc, getDocs, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        const fc={apiKey:"AIzaSyA_IcdzywseRgXTY8MqiOY1LLfwnfps3Oo",authDomain:"wibest-449fe.firebaseapp.com",projectId:"wibest-449fe",storageBucket:"wibest-449fe.firebasestorage.app",messagingSenderId:"438027122345",appId:"1:438027122345:web:70b5427de9bf0a74f51bb8"};
        const db=getFirestore(initializeApp(fc));

        function fmt(a){if(!a||a==='N/A')return'Contact School';const n=parseInt(a);return isNaN(n)?a:'\u20B9'+n.toLocaleString('en-IN');}
        function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'';}
        function stars(r){let s='';for(let i=1;i<=5;i++)s+=i<=r?'\u2605':'\u2606';return s;}
        function fac(name,has){return `<div class="fi ${has?'fy':'fn'}"><svg viewBox="0 0 24 24"><path d="${has?'M20 6L9 17l-5-5':'M18 6L6 18M6 6l12 12'}"/></svg>${name}</div>`;}

        // Placeholder school images
        const placeholders = [
            'https://images.unsplash.com/photo-1580582932707-520aed937b7b?w=400&h=300&fit=crop',
            'https://images.unsplash.com/photo-1509062522246-3755977927d7?w=400&h=300&fit=crop',
            'https://images.unsplash.com/photo-1523050854058-8df90110c476?w=400&h=300&fit=crop'
        ];

        let currentId='';

        function render(s){
            currentId=s.id;
            const boardNames=['CBSE','ICSE','IB','Cambridge','IGCSE','State','Montessori','CBSE/IB','CBSE/Cambridge','ICSE/IB','ICSE/IGCSE','CBSE/State','NIOS'];
            let board=s.board||'';
            let schoolType=s.gender_type||s.gender||'Co-ed';
            // If board is N/A or empty, check if type field has a board name
            if(!board||board==='N/A'){
                const t=s.school_type||s.type||'';
                if(boardNames.some(b=>t.toUpperCase().includes(b.toUpperCase()))){board=t;}
                else{board='N/A';}
            }
            // If board field accidentally has Co-ed/Boys/Girls, swap
            if(['Co-ed','Boys','Girls'].includes(board)){const temp=board;board=s.school_type||s.type||'N/A';schoolType=temp;}
            const city=s.city||'',state=s.state||'',est=s.established_year||s.established||s.establishedYear||'';
            const grades=s.grades_offered||s.grades||s.gradesOffered||'';
            const ratio=s.student_teacher_ratio||s.studentTeacherRatio||'';
            const students=s.total_students||s.totalStudents||'';
            const teachers=s.total_teachers||s.totalTeachers||'';
            const passP=s.pass_percentage||s.boardResults||'';
            const desc=s.long_description||s.description||s.shortDescription||'';
            const website=s.website||'',fee=s.fee_tuition||s.fees||s.price||'';
            const feeT=s.fee_transport||s.transportFee||'',feeH=s.fee_hostel||'';
            const lat=s.coordinates?.lat||0,lng=s.coordinates?.lng||0;
            const images=s.gallery_images||s.images||[];
            const displayImages=images.length>0?images:placeholders;

            // Google rating (stored in Firestore or default)
            const gRating=s.google_rating||0;
            const gReviews=s.google_reviews_count||0;
            const gMapUrl=lat&&lng?`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`:'';

            // Strengths / distinct features
            const strengths=s.strengths||s.distinct_features||[];
            // Programs
            const programs=s.programs||s.coaching||[];

            document.title=`${s.name} — WIB`;

            document.getElementById('pageContent').innerHTML=`
                <div class="bc"><a href="index.html">Home</a><span>/</span><a href="schools.html">Schools</a><span>/</span>${s.name}</div>
                <div class="hero"><div class="hero-in">
                    <div class="hero-info"><h1>${s.name}</h1>
                        <div class="hero-city">${cap(city)}${state?', '+state:''}, India</div>
                        <div class="hero-badges">${board!=='N/A'?`<span class="hero-badge">${board}</span>`:''}<span class="hero-badge">${schoolType}</span>${est?`<span class="hero-badge">Est. ${est}</span>`:''}</div>
                    </div>
                    <div class="hero-score"><div class="hero-score-num">${gRating>0?gRating.toFixed(1):'—'}</div><div class="hero-score-label">${gRating>0?'Google rating':'No rating yet'}</div></div>
                </div></div>

                <div class="ct"><div class="main">

                    ${desc?`<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h2>About</h2></div><div class="cb"><p style="font-size:14px;color:var(--slate-600);line-height:1.7;">${desc}</p></div></div>`:''}

                    <div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><h2>Academic details</h2></div>
                    <div class="cb"><div class="ig">
                        <div class="ii"><div class="il">Board</div><div class="iv">${board}</div></div>
                        <div class="ii"><div class="il">Type</div><div class="iv">${schoolType}</div></div>
                        ${grades?`<div class="ii"><div class="il">Grades</div><div class="iv">${Array.isArray(grades)?grades.join(', '):grades}</div></div>`:''}
                        ${ratio?`<div class="ii"><div class="il">Student-teacher ratio</div><div class="iv">${ratio}</div></div>`:''}
                        ${students?`<div class="ii"><div class="il">Total students</div><div class="iv">${students}</div></div>`:''}
                        ${teachers?`<div class="ii"><div class="il">Total teachers</div><div class="iv">${teachers}</div></div>`:''}
                        ${passP?`<div class="ii"><div class="il">Board results</div><div class="iv">${passP}</div></div>`:''}
                        ${est?`<div class="ii"><div class="il">Established</div><div class="iv">${est}</div></div>`:''}
                    </div></div></div>

                    ${strengths.length>0?`<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><h2>What makes this school stand out</h2></div>
                    <div class="cb"><div class="strength-grid">${strengths.map(st=>`<div class="strength-item"><h4>${st.title||st}</h4>${st.desc?`<p>${st.desc}</p>`:''}</div>`).join('')}</div></div></div>`
                    :`<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><h2>What makes this school stand out</h2></div>
                    <div class="cb"><p style="font-size:13px;color:var(--slate-400);">Distinct features data is being collected. Check back soon.</p></div></div>`}

                    <div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><h2>Programs & coaching</h2></div>
                    <div class="cb">${programs.length>0?`<div class="prog-grid">${programs.map(p=>`<span class="prog-tag">${p}</span>`).join('')}</div>`:`<p class="prog-empty">Programs and coaching data will be updated soon. This section will include details about JEE, NEET, and other competitive exam preparation offered by the school.</p>`}</div></div>

                    <div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><h2>Facilities</h2></div>
                    <div class="cb"><div class="fg">
                        ${fac('Transport',s.has_transport)}${fac('Hostel',s.has_hostel)}${fac('Science Lab',s.has_lab)}
                        ${fac('Sports',s.has_sports)}${fac('Swimming Pool',s.has_swimming_pool)}${fac('CCTV',s.has_cctv)}
                        ${fac('Security',s.has_security)}${fac('Library',s.has_library)}${fac('Arts / Music',s.has_arts)}
                    </div></div></div>

                    <div class="card"><div class="ch"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><h2>Photo gallery</h2></div>
                    <div class="cb"><div class="gg">${displayImages.map(img=>`<div class="gi"><img src="${img}" alt="School photo" loading="lazy"></div>`).join('')}</div></div></div>

                    ${lat&&lng?`<div class="card"><div class="ch"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><h2>Location</h2></div>
                    <div class="cb"><div class="map-box"><iframe src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed" allowfullscreen loading="lazy"></iframe></div></div></div>`:''}

                    <!-- Ratings Overview -->
                    <div class="card"><div class="ch"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><h2>Ratings overview</h2></div>
                    <div class="cb">
                        <div class="ratings-overview">
                            <div class="ro-card">
                                <div class="ro-source">Google</div>
                                <div class="ro-score">${gRating>0?gRating.toFixed(1):'—'}</div>
                                <div class="ro-stars">${gRating>0?stars(Math.round(gRating)):''}</div>
                                <div class="ro-count">${gReviews>0?gReviews.toLocaleString()+' reviews':'No data yet'}</div>
                                ${gMapUrl?`<a href="${gMapUrl}" target="_blank" class="ro-link">View on Google</a>`:''}
                            </div>
                            <div class="ro-card">
                                <div class="ro-source">WIB Parents</div>
                                <div class="ro-score" id="parentScoreDisplay">—</div>
                                <div class="ro-stars" id="parentStarsDisplay"></div>
                                <div class="ro-count" id="parentCountDisplay">No reviews yet</div>
                                <a href="#parentReviews" class="ro-link">Write a review</a>
                            </div>
                            <div class="ro-card">
                                <div class="ro-source">WIB Students</div>
                                <div class="ro-score" id="studentScoreDisplay">—</div>
                                <div class="ro-stars" id="studentStarsDisplay"></div>
                                <div class="ro-count" id="studentCountDisplay">No reviews yet</div>
                                <a href="#studentReviews" class="ro-link">Write a review</a>
                            </div>
                        </div>
                    </div></div>

                    <!-- Parent Reviews -->
                    <div class="card" id="parentReviews"><div class="ch"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><h2>Parent reviews</h2></div>
                    <div class="cb">
                        <div id="parentReviewsList"></div>
                        <div class="rf" id="parentForm">
                            <h3>Write a parent review</h3>
                            <div class="sr" id="parentStars"><button class="sb" data-val="1">\u2605</button><button class="sb" data-val="2">\u2605</button><button class="sb" data-val="3">\u2605</button><button class="sb" data-val="4">\u2605</button><button class="sb" data-val="5">\u2605</button></div>
                            <div class="fr"><input type="text" class="fi2" id="pName" placeholder="Your name"><input type="email" class="fi2" id="pEmail" placeholder="Your email"></div>
                            <textarea class="fi2" id="pText" placeholder="Share your experience as a parent..."></textarea>
                            <button class="btn-s" id="pSubmit">Submit review</button>
                            <div class="ms" id="pSuccess">Thank you. Your review has been submitted for approval.</div>
                        </div>
                    </div></div>

                    <!-- Student Reviews -->
                    <div class="card" id="studentReviews"><div class="ch"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><h2>Student reviews</h2></div>
                    <div class="cb">
                        <div id="studentReviewsList"></div>
                        <div class="rf" id="studentForm">
                            <h3>Write a student review</h3>
                            <div class="sr" id="studentStars"><button class="sb" data-val="1">\u2605</button><button class="sb" data-val="2">\u2605</button><button class="sb" data-val="3">\u2605</button><button class="sb" data-val="4">\u2605</button><button class="sb" data-val="5">\u2605</button></div>
                            <div class="fr"><input type="text" class="fi2" id="sName" placeholder="Your name"><input type="email" class="fi2" id="sEmail" placeholder="Your email"></div>
                            <textarea class="fi2" id="sText" placeholder="Share your experience as a student or alumni..."></textarea>
                            <button class="btn-s" id="sSubmit">Submit review</button>
                            <div class="ms" id="sSuccess">Thank you. Your review has been submitted for approval.</div>
                        </div>
                    </div></div>

                    <a href="schools.html" class="btn-back"><svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>Back to all schools</a>
                </div>

                <div class="side">
                    <div class="sc"><h3><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Fee structure</h3>
                        <div class="fee-row"><span class="fl">Tuition (Annual)</span><span class="fv">${fee?fmt(fee):'Contact School'}</span></div>
                        ${feeT?`<div class="fee-row"><span class="fl">Transport</span><span class="fv">${fmt(feeT)}</span></div>`:''}
                        ${feeH?`<div class="fee-row"><span class="fl">Hostel</span><span class="fv">${fmt(feeH)}</span></div>`:''}
                    </div>
                    <div class="sc"><h3><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>Contact</h3>
                        <div class="cg" id="contactGated"><p>Contact details are available on request.</p><button class="btn-r" id="requestBtn">Request contact details</button>
                            <div class="rqf" id="rqForm"><input type="text" class="fi2" id="rqName" placeholder="Your name"><input type="email" class="fi2" id="rqEmail" placeholder="Your email"><input type="text" class="fi2" id="rqPhone" placeholder="Phone (optional)">
                                <select class="fi2" id="rqReason"><option value="">Reason</option><option value="admission">Admission inquiry</option><option value="visit">School visit</option><option value="inquiry">General inquiry</option><option value="other">Other</option></select>
                                <button class="btn-s" id="rqSubmit">Submit request</button></div>
                            <div class="ms" id="rqSuccess">Request sent. Details will be emailed once approved.</div>
                        </div>
                    </div>
                    ${website?`<div class="sc"><h3><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Website</h3><a href="${website}" target="_blank" style="color:var(--blue);text-decoration:none;font-size:13px;font-weight:500;">${website.replace('https://','').replace('http://','')}</a></div>`:''}
                </div></div>`;

            setupReviewHandlers('parent','parentStars','pName','pEmail','pText','pSubmit','parentForm','pSuccess');
            setupReviewHandlers('student','studentStars','sName','sEmail','sText','sSubmit','studentForm','sSuccess');
            setupContactRequest(s);
            loadAllReviews();
        }

        function setupReviewHandlers(type,starsId,nameId,emailId,textId,btnId,formId,successId){
            let rating=0;
            const starsEl=document.getElementById(starsId);
            if(!starsEl)return;
            starsEl.querySelectorAll('.sb').forEach(btn=>{
                btn.addEventListener('click',()=>{rating=parseInt(btn.dataset.val);starsEl.querySelectorAll('.sb').forEach((b,i)=>b.classList.toggle('active',i<rating));});
                btn.addEventListener('mouseenter',()=>{const v=parseInt(btn.dataset.val);starsEl.querySelectorAll('.sb').forEach((b,i)=>b.style.color=i<v?'#D97706':'#CBD5E1');});
            });
            starsEl.addEventListener('mouseleave',()=>{starsEl.querySelectorAll('.sb').forEach((b,i)=>b.style.color=i<rating?'#D97706':'#CBD5E1');});

            document.getElementById(btnId)?.addEventListener('click',async()=>{
                const name=document.getElementById(nameId).value.trim(),email=document.getElementById(emailId).value.trim(),text=document.getElementById(textId).value.trim();
                if(!name||!email||!text||!rating){alert('Please fill in all fields and select a rating.');return;}
                try{await addDoc(collection(db,"reviews"),{item_id:currentId,category:'schools',review_type:type,user_name:name,user_email:email,rating:rating,review_text:text,is_approved:false,created_at:serverTimestamp()});
                document.getElementById(formId).style.display='none';document.getElementById(successId).style.display='block';}catch(e){alert('Error: '+e.message);}
            });
        }

        function setupContactRequest(s){
            document.getElementById('requestBtn')?.addEventListener('click',()=>{document.getElementById('rqForm').style.display='flex';document.getElementById('requestBtn').style.display='none';});
            document.getElementById('rqSubmit')?.addEventListener('click',async()=>{
                const name=document.getElementById('rqName').value.trim(),email=document.getElementById('rqEmail').value.trim(),reason=document.getElementById('rqReason').value;
                if(!name||!email||!reason){alert('Please fill in name, email, and reason.');return;}
                try{await addDoc(collection(db,"contact_requests"),{item_id:currentId,school_name:s.name,requester_name:name,requester_email:email,requester_phone:document.getElementById('rqPhone').value.trim(),reason:reason,status:'pending',created_at:serverTimestamp()});
                document.getElementById('rqForm').style.display='none';document.getElementById('rqSuccess').style.display='block';}catch(e){alert('Error: '+e.message);}
            });
        }

        async function loadAllReviews(){
            try{
                const q=query(collection(db,"reviews"),where("item_id","==",currentId),where("is_approved","==",true));
                const snap=await getDocs(q);
                let parentHtml='',studentHtml='',pCount=0,sCount=0,pTotal=0,sTotal=0;
                snap.forEach(d=>{
                    const r=d.data();
                    const html=`<div style="padding:12px 0;border-bottom:1px solid var(--slate-100);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><strong style="font-size:13px;">${r.user_name}</strong><span style="color:var(--amber);font-size:13px;">${stars(r.rating)}</span></div><p style="font-size:13px;color:var(--slate-600);line-height:1.6;">${r.review_text}</p></div>`;
                    if(r.review_type==='student'){studentHtml+=html;sCount++;sTotal+=r.rating;}
                    else{parentHtml+=html;pCount++;pTotal+=r.rating;}
                });

                const noRevSvg='<svg viewBox="0 0 24 24" style="width:24px;height:24px;stroke:var(--slate-300);fill:none;stroke-width:1.5;display:block;margin:0 auto 6px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
                document.getElementById('parentReviewsList').innerHTML=parentHtml||`<div class="no-rev">${noRevSvg}No parent reviews yet. Be the first to share your experience.</div>`;
                document.getElementById('studentReviewsList').innerHTML=studentHtml||`<div class="no-rev">${noRevSvg}No student reviews yet. Be the first to share your experience.</div>`;

                // Update ratings overview
                if(pCount>0){const avg=(pTotal/pCount).toFixed(1);document.getElementById('parentScoreDisplay').textContent=avg;document.getElementById('parentStarsDisplay').innerHTML=stars(Math.round(pTotal/pCount));document.getElementById('parentCountDisplay').textContent=pCount+' reviews';}
                if(sCount>0){const avg=(sTotal/sCount).toFixed(1);document.getElementById('studentScoreDisplay').textContent=avg;document.getElementById('studentStarsDisplay').innerHTML=stars(Math.round(sTotal/sCount));document.getElementById('studentCountDisplay').textContent=sCount+' reviews';}
            }catch(e){console.error(e);}
        }

        (async()=>{
            const id=new URLSearchParams(window.location.search).get('id');
            if(!id){document.getElementById('pageContent').innerHTML='<div class="lc"><p style="color:var(--slate-400);">No school selected. <a href="schools.html" style="color:var(--blue);">Browse schools</a></p></div>';return;}
            try{const snap=await getDoc(doc(db,"items",id));if(snap.exists())render({id:snap.id,...snap.data()});
            else document.getElementById('pageContent').innerHTML='<div class="lc"><p style="color:var(--slate-400);">School not found. <a href="schools.html" style="color:var(--blue);">Browse schools</a></p></div>';}
            catch(e){document.getElementById('pageContent').innerHTML=`<div class="lc"><p style="color:var(--slate-400);">${e.message}</p></div>`;}
        })();
    </script>
</body>
</html>
