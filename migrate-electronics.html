const phones = products.filter(p=>p.subcategory==='phone');
const laptops = products.filter(p=>p.subcategory==='laptop');
document.getElementById('phoneCount').textContent = phones.length;
document.getElementById('laptopCount').textContent = laptops.length;
document.getElementById('totalCount').textContent = products.length;

const logEl = document.getElementById('log');
function log(text, cls='') { logEl.innerHTML += `<div class="${cls}">${text}</div>`; logEl.scrollTop = logEl.scrollHeight; }

async function startMigration() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('startBtn');
  if (!email || !pass) { alert('Enter email and password'); return; }
  btn.disabled = true; btn.textContent = 'Logging in...';
  logEl.style.display = 'block';
  log('Logging in...', 'info');
  try { await auth.signInWithEmailAndPassword(email, pass); log('Logged in successfully', 'ok'); }
  catch(e) { log('Login failed: ' + e.message, 'err'); btn.disabled = false; btn.textContent = 'Login & Start Migration'; return; }

  btn.textContent = 'Migrating...';
  log('Starting migration of ' + products.length + ' products...', 'info');
  let ok = 0, fail = 0;
  const bar = document.getElementById('progressBar');

  for (let i = 0; i < products.length; i++) {
    const p = products[i];
    const id = p.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    try {
      await db.collection('electronics').doc(id).set({
        ...p,
        category: 'electronics',
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });
      ok++;
      log(`[${i + 1}/${products.length}] ${p.name} — OK`, 'ok');
    } catch(e) {
      fail++;
      log(`[${i + 1}/${products.length}] ${p.name} — FAILED: ${e.message}`, 'err');
    }
    bar.style.width = ((i + 1) / products.length * 100) + '%';
  }
  log(`\nMigration complete: ${ok} success, ${fail} failed`, 'info');
  btn.textContent = `Done — ${ok} products migrated`;
}
