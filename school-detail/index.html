<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Details — WIB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary:#fff;--bg-secondary:#f8fafc;--bg-card:#fff;--bg-nav:rgba(255,255,255,0.92);
  --text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;
  --accent:#2563eb;--accent-hover:#1d4ed8;--accent-light:#eff6ff;
  --border:#e2e8f0;--border-hover:#cbd5e1;--tag-bg:#f1f5f9;--tag-text:#334155;
  --green:#16a34a;--green-bg:#f0fdf4;--red:#dc2626;
  --shadow-sm:0 1px 2px rgba(15,23,42,0.05);--shadow-md:0 4px 12px rgba(15,23,42,0.08);
  --radius:10px;--nav-height:64px;--cat-height:44px;
}
[data-theme="dark"] {
  --bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-card:#1e293b;--bg-nav:rgba(15,23,42,0.95);
  --text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;
  --accent:#3b82f6;--accent-hover:#60a5fa;--accent-light:#1e3a5f;
  --border:#334155;--border-hover:#475569;--tag-bg:#334155;--tag-text:#cbd5e1;
  --green:#4ade80;--green-bg:#14532d;
  --shadow-sm:0 1px 2px rgba(0,0,0,0.2);--shadow-md:0 4px 12px rgba(0,0,0,0.3);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg-secondary);color:var(--text-primary);line-height:1.6;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg-nav);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:background .3s}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:var(--nav-height);display:flex;align-items:center;justify-content:space-between}
.nav-logo img{height:52px}
.nav-links{display:flex;gap:28px}
.nav-links a{font-size:14px;font-weight:500;color:var(--text-secondary);transition:color .2s}
.nav-links a:hover{color:var(--accent)}
.nav-right{display:flex;align-items:center;gap:12px}
.theme-toggle{width:38px;height:38px;border-radius:50%;background:var(--tag-bg);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.theme-toggle:hover{background:var(--border)}
.theme-toggle svg{width:18px;height:18px;stroke:var(--text-secondary);fill:none;stroke-width:2}
.hamburger{display:none;width:38px;height:38px;background:none;border:none;cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.hamburger span{display:block;width:20px;height:2px;background:var(--text-primary);border-radius:1px}
.cat-strip{background:var(--bg-primary);border-bottom:1px solid var(--border)}
.cat-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:var(--cat-height);display:flex;align-items:center;overflow-x:auto;scrollbar-width:none}
.cat-inner::-webkit-scrollbar{display:none}
.cat-link{padding:8px 18px;font-size:13px;font-weight:500;color:var(--text-muted);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.cat-link.active{color:var(--accent);border-bottom-color:var(--accent)}
.cat-link .soon{font-size:9px;font-weight:700;text-transform:uppercase;background:var(--tag-bg);color:var(--text-muted);padding:1px 5px;border-radius:3px;margin-left:5px}
.mobile-menu{display:none;position:fixed;inset:0;z-index:200;background:var(--bg-primary);padding:80px 32px 32px;flex-direction:column;gap:4px}
.mobile-menu.open{display:flex}
.mobile-menu a{padding:14px 0;font-size:18px;font-weight:500;border-bottom:1px solid var(--border)}
.mobile-close{position:absolute;top:16px;right:20px;width:40px;height:40px;background:none;border:none;cursor:pointer;font-size:24px;color:var(--text-primary)}

/* CONTENT */
.content{max-width:1200px;margin:calc(var(--nav-height)+var(--cat-height)+24px) auto 60px;padding:0 24px}
.breadcrumb{font-size:13px;color:var(--text-muted);margin-bottom:20px}
.breadcrumb a{color:var(--accent)}
.detail-grid{display:grid;grid-template-columns:1fr 360px;gap:24px}

/* Hero card */
.hero-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;transition:background .3s}
.school-name{font-family:'Outfit',sans-serif;font-size:28px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px}
.school-badges{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.badge{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;background:var(--tag-bg);color:var(--tag-text)}
.badge.board{background:var(--accent-light);color:var(--accent)}
.badge.rating{background:var(--green-bg);color:var(--green)}
.school-desc{color:var(--text-secondary);font-size:14px;line-height:1.7;margin-bottom:20px}

/* Sections */
.section{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-top:20px;transition:background .3s}
.section-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:2}

/* Info grid */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.info-item{padding:12px 16px;background:var(--bg-secondary);border-radius:8px}
.info-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.info-value{font-size:14px;font-weight:600}

/* Facilities */
.fac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.fac-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;background:var(--bg-secondary);font-size:13px;font-weight:500}
.fac-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fac-icon.yes{background:var(--green-bg);color:var(--green)}
.fac-icon.no{background:#fef2f2;color:var(--red)}
.fac-icon svg{width:12px;height:12px;fill:currentColor}

/* Gallery */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.gallery-img{width:100%;height:160px;object-fit:cover;border-radius:8px;border:1px solid var(--border)}
.gallery-empty{color:var(--text-muted);font-size:14px;padding:24px;text-align:center;background:var(--bg-secondary);border-radius:8px}

/* Reviews */
.rating-overview{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.rating-source{flex:1;min-width:140px;padding:16px;border-radius:8px;background:var(--bg-secondary);text-align:center}
.rating-source .score{font-size:28px;font-weight:700;color:var(--text-primary)}
.rating-source .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.rating-source .link{font-size:12px;color:var(--accent);margin-top:6px;display:inline-block}
.review-empty{color:var(--text-muted);font-size:14px;padding:16px;text-align:center;background:var(--bg-secondary);border-radius:8px}

/* Sidebar */
.sidebar{display:flex;flex-direction:column;gap:20px}
.sidebar-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:background .3s}
.sidebar-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin-bottom:12px}

/* Enquiry form */
.enquiry-form{display:flex;flex-direction:column;gap:12px}
.enquiry-form input,.enquiry-form textarea,.enquiry-form select{
  padding:10px 14px;border:1px solid var(--border);border-radius:8px;
  background:var(--bg-secondary);color:var(--text-primary);font-family:inherit;font-size:14px;
  transition:border .2s;
}
.enquiry-form input:focus,.enquiry-form textarea:focus,.enquiry-form select:focus{outline:none;border-color:var(--accent)}
.enquiry-form textarea{resize:vertical;min-height:80px}
.btn-submit{
  padding:12px;border-radius:8px;background:var(--accent);color:#fff;
  font-family:inherit;font-size:14px;font-weight:600;border:none;cursor:pointer;
  transition:background .2s;
}
.btn-submit:hover{background:var(--accent-hover)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.form-msg{font-size:13px;text-align:center;padding:8px;border-radius:6px}
.form-msg.success{background:var(--green-bg);color:var(--green)}
.form-msg.error{background:#fef2f2;color:var(--red)}

/* Map */
.map-frame{width:100%;height:220px;border:none;border-radius:8px;background:var(--bg-secondary)}

/* Strengths */
.strength-list{display:flex;flex-direction:column;gap:8px}
.strength-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--bg-secondary);border-radius:8px;font-size:13px}
.strength-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}

/* Programs */
.program-tags{display:flex;flex-wrap:wrap;gap:8px}
.program-tag{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:500;background:var(--accent-light);color:var(--accent)}

/* Loading */
.loading{text-align:center;padding:100px 24px;color:var(--text-muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{background:var(--bg-primary);border-top:1px solid var(--border);padding:32px 24px;text-align:center;font-size:13px;color:var(--text-muted)}

@media(max-width:900px){
  .detail-grid{grid-template-columns:1fr}
  .nav-links{display:none}.hamburger{display:flex}
  .info-grid{grid-template-columns:1fr}
  .school-name{font-size:22px}
  .nav-logo img{height:42px}
}
</style>
</head>
<body>

<!-- NAV (same as schools page) -->
<nav class="nav"><div class="nav-inner">
  <a href="/" class="nav-logo"><img src="/logo.png" alt="WIB"></a>
  <div class="nav-links">
    <a href="/">Home</a><a href="/schools">Schools</a><a href="/colleges">Colleges</a>
    <a href="/compare">Compare</a><a href="/blog">Blog</a><a href="/about">About</a><a href="/contact">Contact</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
      <svg class="sun-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg class="moon-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button class="hamburger" onclick="toggleMobile()"><span></span><span></span><span></span></button>
  </div>
</div></nav>
<div class="cat-strip"><div class="cat-inner">
  <a href="/schools" class="cat-link active">Schools</a><a href="/colleges" class="cat-link">Colleges</a>
  <a href="#" class="cat-link">Electronics <span class="soon">Soon</span></a>
  <a href="#" class="cat-link">Cars & Bikes <span class="soon">Soon</span></a>
  <a href="#" class="cat-link">Places <span class="soon">Soon</span></a>
  <a href="#" class="cat-link">Travel <span class="soon">Soon</span></a>
  <a href="#" class="cat-link">Restaurants <span class="soon">Soon</span></a>
</div></div>
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" onclick="toggleMobile()">&#x2715;</button>
  <a href="/">Home</a><a href="/schools">Schools</a><a href="/colleges">Colleges</a>
  <a href="/compare">Compare</a><a href="/blog">Blog</a><a href="/about">About</a><a href="/contact">Contact</a>
</div>

<!-- CONTENT -->
<div class="content" id="pageContent">
  <div class="loading"><div class="spinner"></div><p>Loading school details...</p></div>
</div>

<footer class="footer">WIB — Independent. Data-driven.</footer>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
/*  FIREBASE CONFIG — Replace API key if needed */
firebase.initializeApp({
  apiKey: "AIzaSyA_IcdzywseRgXTY8MqiOY1LLfwnfps3Oo",
  authDomain: "wibest-449fe.firebaseapp.com",
  projectId: "wibest-449fe",
  storageBucket: "wibest-449fe.appspot.com"
});
const db = firebase.firestore();

/* THEME */
function toggleTheme(){const h=document.documentElement;const d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');try{localStorage.setItem('wib-theme',d?'light':'dark')}catch(e){}updateThemeIcon()}
function updateThemeIcon(){const d=document.documentElement.getAttribute('data-theme')==='dark';document.querySelector('.sun-icon').style.display=d?'none':'block';document.querySelector('.moon-icon').style.display=d?'block':'none'}
(function(){try{if(localStorage.getItem('wib-theme')==='dark')document.documentElement.setAttribute('data-theme','dark')}catch(e){}updateThemeIcon()})();
function toggleMobile(){document.getElementById('mobileMenu').classList.toggle('open')}

/* BOARD NAMES */
const BOARD_NAMES=['CBSE','ICSE','IB','IGCSE','Cambridge','State Board','NIOS'];
function getBoard(d){
  for(const field of['board','type','board_type','curriculum']){
    if(d[field]){const v=d[field].toUpperCase();for(const b of BOARD_NAMES){if(v.includes(b.toUpperCase()))return b}}
  }
  return d.board||'N/A';
}
function getSchoolType(d){
  const types=['Co-ed','Boys','Girls','Day School','Boarding'];
  for(const field of['gender','school_type']){if(d[field]){for(const t of types){if(d[field].toLowerCase().includes(t.toLowerCase()))return t}}}
  if(d.type){const v=d.type.toUpperCase();let isBoard=false;for(const b of BOARD_NAMES){if(v.includes(b.toUpperCase())){isBoard=true;break}}if(!isBoard){for(const t of types){if(d.type.toLowerCase().includes(t.toLowerCase()))return t}}}
  return 'Co-ed';
}
function getFees(d){if(d.fees&&typeof d.fees==='object')return d.fees.tuition||d.fees.annual||0;if(typeof d.fees==='number')return d.fees;return d.annual_fees||d.tuition_fees||0}
function formatFees(a){if(!a)return'N/A';if(a>=100000)return(a/100000).toFixed(1)+'L';if(a>=1000)return(a/1000).toFixed(0)+'K';return a.toString()}

/* LOAD */
async function loadSchool(){
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  const autoEnquire=params.get('enquire')==='true';
  if(!id){document.getElementById('pageContent').innerHTML='<div class="loading">School not found. <a href="/schools" style="color:var(--accent)">Browse all schools</a></div>';return}

  try{
    const doc=await db.collection('items').doc(id).get();
    if(!doc.exists){document.getElementById('pageContent').innerHTML='<div class="loading">School not found. <a href="/schools" style="color:var(--accent)">Browse all schools</a></div>';return}
    const s=doc.data();
    document.title=s.name+' — WIB';
    renderDetail(id,s,autoEnquire);
  }catch(err){
    console.error(err);
    document.getElementById('pageContent').innerHTML='<div class="loading">Error loading school. Please refresh.</div>';
  }
}

function renderDetail(id,s,autoEnquire){
  const board=getBoard(s);
  const type=getSchoolType(s);
  const fees=getFees(s);
  const rating=s.google_rating||s.rating||0;
  const lat=s.coordinates?.lat||s.lat||0;
  const lng=s.coordinates?.lng||s.lng||s.coordinates?.lon||0;

  const fac=s.facilities||s;
  const facilities=[
    {name:'Transport',val:fac.transport||fac.transportation},
    {name:'Sports',val:fac.sports},
    {name:'Library',val:fac.library},
    {name:'Science Lab',val:fac.science_lab||fac.lab},
    {name:'CCTV',val:fac.cctv},
    {name:'Security',val:fac.security},
    {name:'Arts & Music',val:fac.arts||fac.arts_music},
    {name:'Swimming Pool',val:fac.pool||fac.swimming_pool},
    {name:'Hostel',val:fac.hostel}
  ];

  const strengths=s.strengths||s.distinct_features||[];
  const programs=s.programs||s.coaching||[];
  const images=s.images||s.gallery||[];

  const checkSvg='<svg viewBox="0 0 16 16"><path d="M13.78 4.22a.75.75 0 010 1.06l-7.25 7.25a.75.75 0 01-1.06 0L2.22 9.28a.75.75 0 011.06-1.06L6 10.94l6.72-6.72a.75.75 0 011.06 0z"/></svg>';
  const crossSvg='<svg viewBox="0 0 16 16"><path d="M4.22 4.22a.75.75 0 011.06 0L8 6.94l2.72-2.72a.75.75 0 111.06 1.06L9.06 8l2.72 2.72a.75.75 0 11-1.06 1.06L8 9.06l-2.72 2.72a.75.75 0 01-1.06-1.06L6.94 8 4.22 5.28a.75.75 0 010-1.06z"/></svg>';

  document.getElementById('pageContent').innerHTML=`
  <div class="breadcrumb"><a href="/schools">Schools</a> / ${s.name}</div>
  <div class="detail-grid">
    <div class="main-col">
      <!-- Hero -->
      <div class="hero-card">
        <h1 class="school-name">${s.name}</h1>
        <div class="school-badges">
          ${board!=='N/A'?`<span class="badge board">${board}</span>`:''}
          <span class="badge">${s.city||''}</span>
          <span class="badge">${type}</span>
          ${rating>0?`<span class="badge rating">&#9733; ${rating.toFixed(1)}</span>`:''}
        </div>
        ${s.description?`<p class="school-desc">${s.description}</p>`:''}
      </div>

      <!-- Academic Details -->
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> Academic Details</div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">Board</div><div class="info-value">${board}</div></div>
          <div class="info-item"><div class="info-label">Type</div><div class="info-value">${type}</div></div>
          <div class="info-item"><div class="info-label">City</div><div class="info-value">${s.city||'N/A'}</div></div>
          <div class="info-item"><div class="info-label">Established</div><div class="info-value">${s.established||s.year_established||'N/A'}</div></div>
          <div class="info-item"><div class="info-label">Annual Fees</div><div class="info-value">${fees>0?'₹'+fees.toLocaleString('en-IN'):'N/A'}</div></div>
          <div class="info-item"><div class="info-label">Board Results</div><div class="info-value">${s.board_results||s.results||'N/A'}</div></div>
          <div class="info-item"><div class="info-label">Student:Teacher</div><div class="info-value">${s.student_teacher_ratio||'N/A'}</div></div>
          <div class="info-item"><div class="info-label">Grades</div><div class="info-value">${s.grades||s.classes||'N/A'}</div></div>
        </div>
      </div>

      <!-- Facilities -->
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Facilities</div>
        <div class="fac-grid">
          ${facilities.map(f=>`<div class="fac-item"><div class="fac-icon ${f.val?'yes':'no'}">${f.val?checkSvg:crossSvg}</div>${f.name}</div>`).join('')}
        </div>
      </div>

      <!-- Photo Gallery -->
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Photo Gallery</div>
        ${images.length>0?
          `<div class="gallery-grid">${images.map(url=>`<img class="gallery-img" src="${url}" alt="School photo" onerror="this.style.display='none'">`).join('')}</div>`:
          '<div class="gallery-empty">Photos coming soon. Add photos via the Image Manager.</div>'}
      </div>

      <!-- Ratings Overview -->
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> Ratings Overview</div>
        <div class="rating-overview">
          <div class="rating-source">
            <div class="score">${rating>0?rating.toFixed(1):'--'}</div>
            <div class="label">Google</div>
            ${lat&&lng?`<a class="link" href="https://www.google.com/maps/search/?api=1&query=${lat},${lng}" target="_blank" rel="noopener">View on Google Maps</a>`:''}
          </div>
          <div class="rating-source">
            <div class="score" id="parentScore">--</div>
            <div class="label">WIB Parents</div>
          </div>
          <div class="rating-source">
            <div class="score" id="studentScore">--</div>
            <div class="label">WIB Students</div>
          </div>
        </div>
      </div>

      <!-- Parent Reviews -->
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Parent Reviews</div>
        <div id="parentReviews"><div class="review-empty">No parent reviews yet. Be the first to share your experience.</div></div>
      </div>

      <!-- Student Reviews -->
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Student Reviews</div>
        <div id="studentReviews"><div class="review-empty">No student reviews yet.</div></div>
      </div>

      ${strengths.length>0?`
      <!-- Distinct Features -->
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg> What Makes This School Stand Out</div>
        <div class="strength-list">${strengths.map(st=>`<div class="strength-item"><div class="strength-dot"></div><span>${st}</span></div>`).join('')}</div>
      </div>`:''}

      ${programs.length>0?`
      <!-- Programs -->
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> Programs & Coaching</div>
        <div class="program-tags">${programs.map(p=>`<span class="program-tag">${p}</span>`).join('')}</div>
      </div>`:''}

      <!-- Map -->
      ${lat&&lng?`
      <div class="section">
        <div class="section-title"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> Location</div>
        <iframe class="map-frame" loading="lazy" src="https://maps.google.com/maps?q=${lat},${lng}&z=15&output=embed"></iframe>
      </div>`:''}
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- Enquiry Form (CLICKABLE) -->
      <div class="sidebar-card" id="enquiryCard">
        <div class="sidebar-title">Send an Enquiry</div>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px">Interested in this school? Send your details and we will connect you.</p>
        <form class="enquiry-form" onsubmit="submitEnquiry(event,'${id}','${(s.name||'').replace(/'/g,'')}')">
          <input type="text" name="parentName" placeholder="Your name" required>
          <input type="email" name="parentEmail" placeholder="Your email" required>
          <input type="tel" name="parentPhone" placeholder="Your phone number" required>
          <select name="childGrade" required>
            <option value="">Child's grade</option>
            <option>Pre-KG / Nursery</option><option>LKG</option><option>UKG</option>
            <option>Grade 1-3</option><option>Grade 4-5</option><option>Grade 6-8</option>
            <option>Grade 9-10</option><option>Grade 11-12</option>
          </select>
          <textarea name="message" placeholder="Your message (optional)"></textarea>
          <button type="submit" class="btn-submit" id="enquiryBtn">Send Enquiry</button>
        </form>
        <div id="enquiryMsg" style="display:none"></div>
      </div>

      <!-- Fee Structure -->
      <div class="sidebar-card">
        <div class="sidebar-title">Fee Structure</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${s.fees&&typeof s.fees==='object'?
            Object.entries(s.fees).map(([k,v])=>`<div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:var(--text-secondary)">${k.charAt(0).toUpperCase()+k.slice(1)}</span><span style="font-size:14px;font-weight:600">${v?'₹'+v.toLocaleString('en-IN'):'N/A'}</span></div>`).join(''):
            `<div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:var(--text-secondary)">Annual</span><span style="font-size:14px;font-weight:600">${fees>0?'₹'+fees.toLocaleString('en-IN'):'N/A'}</span></div>`}
        </div>
      </div>

      <!-- Website -->
      ${s.website?`
      <div class="sidebar-card">
        <div class="sidebar-title">Official Website</div>
        <a href="${s.website.startsWith('http')?s.website:'https://'+s.website}" target="_blank" rel="noopener"
           style="display:flex;align-items:center;gap:8px;color:var(--accent);font-size:14px;font-weight:500">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Visit School Website
        </a>
      </div>`:''}

      <!-- Quick Actions -->
      <div class="sidebar-card">
        <div class="sidebar-title">Quick Actions</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <a href="/compare" style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-secondary);border-radius:8px;font-size:13px;font-weight:500;transition:background .2s">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Compare with other schools
          </a>
          <a href="/schools" style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-secondary);border-radius:8px;font-size:13px;font-weight:500;transition:background .2s">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Back to all schools
          </a>
        </div>
      </div>
    </div>
  </div>`;

  // Auto-scroll to enquiry if came from enquiry button
  if(autoEnquire){
    setTimeout(()=>{
      document.getElementById('enquiryCard').scrollIntoView({behavior:'smooth',block:'center'});
      document.querySelector('.enquiry-form input[name="parentName"]').focus();
    },500);
  }

  loadReviews(id);
}

/* ENQUIRY SUBMIT */
async function submitEnquiry(e,schoolId,schoolName){
  e.preventDefault();
  const btn=document.getElementById('enquiryBtn');
  const msg=document.getElementById('enquiryMsg');
  btn.disabled=true; btn.textContent='Sending...';

  const form=e.target;
  const data={
    schoolId,schoolName,
    parentName:form.parentName.value,
    parentEmail:form.parentEmail.value,
    parentPhone:form.parentPhone.value,
    childGrade:form.childGrade.value,
    message:form.message.value,
    status:'pending',
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };

  try{
    await db.collection('contact_requests').add(data);
    msg.className='form-msg success';
    msg.textContent='Enquiry sent successfully. We will get back to you soon.';
    msg.style.display='block';
    form.reset();
  }catch(err){
    msg.className='form-msg error';
    msg.textContent='Failed to send. Please try again.';
    msg.style.display='block';
  }
  btn.disabled=false; btn.textContent='Send Enquiry';
}

/* LOAD REVIEWS */
async function loadReviews(schoolId){
  try{
    const snap=await db.collection('reviews').where('schoolId','==',schoolId).where('status','==','approved').get();
    let parentHtml='', studentHtml='', pCount=0, sCount=0, pTotal=0, sTotal=0;
    snap.forEach(doc=>{
      const r=doc.data();
      const html=`<div style="padding:14px;background:var(--bg-secondary);border-radius:8px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-weight:600;font-size:14px">${r.name||'Anonymous'}</span>
          <span style="color:var(--green);font-weight:600;font-size:13px">${'★'.repeat(r.rating||0)}${'☆'.repeat(5-(r.rating||0))}</span>
        </div>
        <p style="font-size:13px;color:var(--text-secondary)">${r.text||r.review||''}</p>
      </div>`;
      if(r.type==='student'){studentHtml+=html;sCount++;sTotal+=(r.rating||0)}
      else{parentHtml+=html;pCount++;pTotal+=(r.rating||0)}
    });
    if(parentHtml)document.getElementById('parentReviews').innerHTML=parentHtml;
    if(studentHtml)document.getElementById('studentReviews').innerHTML=studentHtml;
    if(pCount>0)document.getElementById('parentScore').textContent=(pTotal/pCount).toFixed(1);
    if(sCount>0)document.getElementById('studentScore').textContent=(sTotal/sCount).toFixed(1);
  }catch(e){console.error('Reviews error:',e)}
}

loadSchool();
